  ingestor:
  - apiVersion: v2
    appVersion: 0.3.0
    created: "2026-06-03T07:25:06.334207285Z"
    description: 'Helm chart for submitting a tracebloc data-ingestion run. Renders
      a customer''s ingest.yaml into a ConfigMap and runs a post-install hook that
      POSTs it to jobs-manager''s /internal/submit-ingestion-run. jobs-manager validates
      the YAML, mints a backend token, and creates the ingestor Job directly — this
      chart owns the config + hook artifacts, not the resulting Job or its data. '
    digest: 5a8031afe5cd8c1b8022b3cc9f0469377fe3a8815d49a5dd7795161532131561
    home: https://github.com/tracebloc/client/tree/develop/ingestor
    keywords:
    - tracebloc
    - kubernetes
    - data-ingestion
    maintainers:
    - email: support@tracebloc.io
      name: tracebloc
    name: ingestor
    sources:
    - https://github.com/tracebloc/client
    - https://github.com/tracebloc/data-ingestors
    - https://github.com/tracebloc/client-runtime
    type: application
    urls:
    - https://tracebloc.github.io/client/ingestor-0.2.0.tgz
    version: 0.2.0
