apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.clientData.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
spec:
  storageClassName: {{ .Values.storageClass.name }}
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.clientData.storage }}
