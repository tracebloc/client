# Namespace for client
namespace: <NAMESPACE>

# Configuration for the jobs manager
jobsManager:
  tag: dev
  env:
    CLIENT_ID: "<CLIENT_ID>"
    HTTP_PROXY_HOST:
    HTTP_PROXY_PORT:
    HTTP_PROXY_USERNAME:
    HTTP_PROXY_PASSWORD:
    RESOURCE_REQUESTS: "cpu=2,memory=8Gi"
    RESOURCE_LIMITS: "cpu=2,memory=8Gi"
    GPU_REQUESTS: "" # for GPU support set "nvidia.com/gpu=1"
    GPU_LIMITS: "" # for GPU support set "nvidia.com/gpu=1"
    RUNTIME_CLASS_NAME: "" # optional, for GPU on OpenShift

# OpenShift storage class configuration
# Set create: false to use an existing storage class (e.g. ocs-storagecluster-cephfs, gp3, efs-sc)
storageClass:
  create: false
  name: client-storage-class
  provisioner: openshift-storage.cephfs.csi.ceph.com
  allowVolumeExpansion: true
  volumeBindingMode: Immediate
  reclaimPolicy: Retain
  mountOptions: []
  parameters: {} # e.g. Ceph: { clusterID: "<id>", csiFsid: "<fsid>" }

# Configuration for shared data PVC
clientData:
  name: client-pvc
  storage: 50Gi

# Configuration for logs PVC
clientLogsPvc:
  name: client-logs-pvc
  storage: 10Gi

# Configuration for MySQL PVC
mysqlPvc:
  name: mysql-pvc
  storage: 2Gi

# MySQL deployment configuration
mysql:
  name: mysql-client

# RBAC (OpenShift: use namespaced RBAC when user cannot create cluster-scoped resources)
clusterRole:
  name: jobs-manager-rbac
  create: true
  useClusterScope: false

# Resource monitor DaemonSet for node metrics. Creates a custom SCC with hostPath access to /proc and /sys (read-only).
resourceMonitor:
  enabled: true

# Secrets configuration
secrets:
  create: true
  clientPassword: "<CLIENT_PASSWORD>"

# Docker registry configuration
dockerRegistry:
  create: true
  secretName: regcred
  server: https://index.docker.io/v1/
  username: <DOCKER_USERNAME>
  password: <DOCKER_REGISTRY_PASSWORD or DOCKER_REGISTRY_TOKEN>
  email: <DOCKER_EMAIL>

# Optional: node selector. Omit or leave unset for no selector; set in value files if needed.
# nodeSelector:
#   type: system
