name: Installer tests

# Validates the curl/PowerShell installer (scripts/) across the breadth of
# environments a customer might actually have:
#   • static    — shellcheck + bash -n + PSScriptAnalyzer
#   • unit-bash  — bats (mocked) for the bash installer
#   • unit-pester— Pester for the PowerShell installer, on Linux AND real Windows
#   • distro-prereqs — runs the REAL Linux prerequisite-install path (package
#                  manager, system deps, Docker branch, kernel modules, kubectl/
#                  k3d/helm) inside a fresh container for each major distro family.
#                  This is what catches "works on Ubuntu, breaks on minimal RHEL"
#                  bugs that mocked unit tests can't see.
on:
  push:
    branches: [main, develop, openshift]
    paths:
      - 'scripts/**'
      - '.github/workflows/installer-tests.yaml'
  pull_request:
    # `labeled` is required so adding the `e2e` label to an open PR starts the
    # e2e-journey job immediately — with the default types it would only fire on
    # the next push, making the label gate feel broken.
    types: [opened, synchronize, reopened, labeled]
    branches: [main, develop, openshift]
    paths:
      - 'scripts/**'
      - '.github/workflows/installer-tests.yaml'
  schedule:
    - cron: '0 3 * * 1'   # Mondays 03:00 UTC — catch drift as distro base images move
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Cancel superseded PR runs — this suite is expensive (9-distro
  # docker-in-docker matrix + real k3d e2e + Windows Pester). Never cancel
  # push/schedule runs.
  group: installer-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  static:
    timeout-minutes: 10
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n (syntax) on every shell script
        run: |
          # .bats files are bats DSL (@test "name" { … }), not valid bash — they are
          # syntax-checked by actually running them in the unit-bash job. Parse the
          # real shell scripts here.
          find scripts -type f -name '*.sh' -print0 \
            | while IFS= read -r -d '' f; do bash -n "$f" || exit 1; done
          echo "all shell scripts parse"

      - name: ShellCheck (libs + entrypoints)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck --version | grep version
          # Gate at error severity. The libs are sourced together as one program,
          # so single-file shellcheck reports SC2034 "unused" false positives for
          # shared vars (CURL_SECURE, ARCH_DL, colours…) that are defined in
          # common.sh and consumed in other sourced files. Warnings are printed
          # below for visibility but don't fail the gate.
          shellcheck --severity=error --shell=bash \
            scripts/install.sh scripts/install-k8s.sh scripts/gen-manifest.sh scripts/lib/*.sh \
            scripts/tests/check-drift.sh scripts/tests/distro-prereqs.sh scripts/tests/e2e-auto-upgrade.sh scripts/tests/e2e-cluster.sh scripts/tests/e2e-journey.sh scripts/tests/e2e-proxy.sh scripts/tests/path-persist.sh
          echo "── shellcheck warnings (advisory, non-blocking) ──"
          shellcheck --severity=warning --shell=bash \
            scripts/install.sh scripts/install-k8s.sh scripts/gen-manifest.sh scripts/lib/*.sh \
            scripts/tests/check-drift.sh scripts/tests/distro-prereqs.sh scripts/tests/e2e-auto-upgrade.sh scripts/tests/e2e-cluster.sh scripts/tests/e2e-journey.sh scripts/tests/e2e-proxy.sh scripts/tests/path-persist.sh || true

      - name: Installer manifest is current (supply-chain, R8)
        # The bootstrap verifies each sub-script against scripts/manifest.sha256
        # before running the privileged steps. If a sub-script changed but the
        # manifest didn't, the release would publish a manifest that rejects the
        # very scripts it ships — so fail the PR until the manifest is regenerated.
        # Also cross-checks the bootstrap's FILES list against gen-manifest.sh.
        run: |
          chmod +x scripts/gen-manifest.sh
          scripts/gen-manifest.sh --check

      - name: PSScriptAnalyzer (PowerShell installer)
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser
          # Both PowerShell entrypoints: the bootstrap (install.ps1, R8 trust root)
          # and the main installer (install-k8s.ps1).
          $issues = @()
          foreach ($p in 'scripts/install.ps1', 'scripts/install-k8s.ps1') {
            $issues += Invoke-ScriptAnalyzer -Path $p -Severity Error,Warning
          }
          if ($issues) { $issues | Format-Table -AutoSize }
          $errs = @($issues | Where-Object { $_.Severity -eq 'Error' })
          if ($errs.Count -gt 0) { Write-Error "PSScriptAnalyzer: $($errs.Count) error(s)"; exit 1 }
          Write-Host "no PSScriptAnalyzer errors"

  unit-bash:
    timeout-minutes: 10
    name: bats (bash unit, mocked)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get update -qq && sudo apt-get install -y -qq bats
      - name: Run bats
        run: bats scripts/tests/*.bats

  unit-pester:
    timeout-minutes: 20
    # Pester on Linux pwsh (fast) AND real Windows — the .ps1 installer's actual
    # target. fail-fast:false so a Windows-only surprise doesn't mask Linux signal.
    name: Pester (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Pester
        shell: pwsh
        env:
          TB_PESTER: "1"
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          $cfg = New-PesterConfiguration
          # The whole tests dir — picks up install-k8s.Tests.ps1 AND install.Tests.ps1
          # (the R8 bootstrap) without needing a per-file edit as suites are added.
          $cfg.Run.Path = "scripts/tests"
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = "Detailed"
          Invoke-Pester -Configuration $cfg

  distro-prereqs:
    timeout-minutes: 20
    # Runs the installer's REAL Linux prerequisite path in a fresh container for
    # each distro family. Proves the package-manager / Docker / conntrack / helm
    # branches all resolve and install — the layer where every installer bug we
    # have shipped lived (#718 PATH, #719 RHEL docker-ce, #720 conntrack-tools,
    # the AlmaLinux kernel-modules gap, the Amazon Linux openssl/tar gap).
    # It does NOT start dockerd or create a cluster — that needs a real kernel +
    # systemd, covered by local VMs and (optionally) a future e2e job. Arch is
    # omitted: its official image is x86-only and bare containers need keyring
    # bootstrapping; the pacman branch is covered by the bats unit test.
    name: Prereqs — ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - 'ubuntu:22.04'        # apt / get.docker.com — most common server
          - 'ubuntu:24.04'        # newest LTS
          - 'debian:12'           # apt
          - 'almalinux:9'         # dnf + docker-ce repo (RHEL rebuild, #719)
          - 'almalinux:8'         # older RHEL rebuild
          - 'rockylinux:9'        # the other RHEL rebuild
          - 'amazonlinux:2023'    # dnf + 'docker' pkg — common AWS default
          - 'fedora:latest'       # dnf, falls through to get.docker.com
          - 'opensuse/leap:15.6'  # zypper
    steps:
      - uses: actions/checkout@v4
      - name: Install prerequisites in ${{ matrix.distro }}
        env:
          DISTRO: ${{ matrix.distro }}
        run: |
          docker run --rm -v "$PWD:/src:ro" -w /src "$DISTRO" \
            bash scripts/tests/distro-prereqs.sh

  e2e-cluster:
    timeout-minutes: 30
    # Highest-fidelity check CI can run: brings up an ACTUAL k3d cluster via the
    # installer's own create_cluster() on a real kernel (Docker is preinstalled
    # on the runner), proves it can schedule + run a public workload, then tears
    # down. Stops BEFORE the tracebloc helm install / backend registration (those
    # need private images + real credentials), so it needs no secrets. Runs on
    # both amd64 and arm64 Ubuntu runners (arm64 is free on this public repo).
    name: E2E cluster (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Bring up a real k3d cluster + run a workload
        run: bash scripts/tests/e2e-cluster.sh

  e2e-proxy:
    timeout-minutes: 30
    # Authenticated corporate-proxy E2E (the Charité/hospital archetype): stands
    # up a squid that REQUIRES basic auth, brings the cluster up with the
    # installer's proxy config pointed at it as user:pass@host, and proves the
    # nodes pull a workload image THROUGH the authed proxy (the squid log shows an
    # authenticated auth.docker.io CONNECT, which only a real pull makes). Guards
    # the #172/#174 proxy hardening end-to-end. Single runner (arch-agnostic). No secrets.
    name: E2E auth-proxy (squid)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cluster up through an authenticated proxy
        run: bash scripts/tests/e2e-proxy.sh

  path-persist:
    timeout-minutes: 20
    # Fresh-shell PATH-persistence guard for the tracebloc CLI — the cheap, wide
    # leg. Installs cli/install.sh in a plain container per distro, then opens a
    # BRAND-NEW login AND non-login shell for each of bash/zsh/fish and asserts
    # `tracebloc` resolves + `tracebloc version` runs. This is the cell that goes
    # RED on the pre-fix installer and GREEN on the fixed one (a fresh non-login
    # bash reads ~/.bashrc, not ~/.profile) — the regression guard for the whole
    # PATH class that distro-prereqs / e2e-cluster can't see (they assert in the
    # same shell that ran the installer). No cluster, no Docker-in-Docker, no
    # creds. The script iterates shell × mode INSIDE the container; distro is the
    # matrix axis (it installs zsh/fish in-container where a package exists).
    name: PATH persist — ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - 'ubuntu:22.04'        # most common server
          - 'ubuntu:24.04'        # newest LTS
          - 'debian:12'           # apt
          - 'fedora:latest'       # dnf
          - 'almalinux:9'         # RHEL rebuild
          - 'opensuse/leap:15.6'  # zypper
          - 'alpine:3'            # busybox sh + apk (optional, minimal)
    steps:
      - uses: actions/checkout@v4
      - name: Fresh-shell PATH check in ${{ matrix.distro }}
        env:
          DISTRO: ${{ matrix.distro }}
          # Override TRACEBLOC_CLI_REF here to point at a specific cli install.sh
          # (URL or, for the cross-repo cli-side caller, a local path). Default
          # in the script is the public release installer (cli#61's PATH fix
          # shipped in v0.3.1+).
          TRACEBLOC_CLI_REF: ${{ vars.TRACEBLOC_CLI_REF }}
        run: |
          # Minimal base images (Alpine) ship only busybox `sh` — no bash — so we
          # can't exec the bash script directly as the entrypoint (the container
          # dies at init before line 1). Bootstrap bash via a POSIX `sh -c` wrapper:
          # `command -v bash` short-circuits on every glibc distro (they already
          # have it), and the apk branch only fires on Alpine. Then exec the script.
          docker run --rm \
            -e TRACEBLOC_CLI_REF \
            -v "$PWD:/src:ro" -w /src "$DISTRO" \
            sh -c 'command -v bash >/dev/null 2>&1 || apk add --no-cache bash >/dev/null 2>&1; exec bash scripts/tests/path-persist.sh'

  e2e-journey:
    timeout-minutes: 30
    # Leg 2 — the full last-mile journey on a real cluster: create_cluster() →
    # install the CLI via cli/install.sh → apply a CREDENTIAL-FREE stub the CLI
    # discovers (a *-jobs-manager Deployment with the chart's labels + an
    # `ingestor` SA) → assert `tracebloc cluster info` succeeds AND resolves from
    # a fresh shell → `dataset push --dry-run` smoke. No private images, no
    # secrets (the stub stands in for the parent release). Heavier than Leg 1
    # (boots a real k3d cluster), so — mirroring cli's e2e.yml — it runs on the
    # nightly schedule + workflow_dispatch, and on a PR ONLY when it carries the
    # `e2e` label. amd64, like e2e-cluster.
    name: E2E last-mile journey (amd64)
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'e2e')
    steps:
      - uses: actions/checkout@v4
      - name: Install → CLI → cluster info (fresh shell) → dataset push --dry-run
        env:
          TRACEBLOC_CLI_REF: ${{ vars.TRACEBLOC_CLI_REF }}
        run: bash scripts/tests/e2e-journey.sh
