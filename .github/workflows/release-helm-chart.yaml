# Production-ready: Package and publish the tracebloc Helm chart.
# Chart repo used for installation: https://github.com/tracebloc/client
# Users install with: helm repo add tracebloc https://tracebloc.github.io/client
# This workflow publishes to this repo's gh-pages; to serve from client repo,
# copy the generated .tgz and index.yaml to tracebloc/client gh-pages branch.
name: Release Helm Chart

on:
  release:
    types: [published]

env:
  HELM_EXPERIMENTAL_OCI: 0

jobs:
  release:
    name: Package and publish tracebloc chart
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push to gh-pages, create release and upload assets on tag
      pages: write
      id-token: write
    steps:
      - name: Checkout
        # Pin ref to the release tag rather than letting checkout default to
        # github.ref, which intermittently arrives empty on release-triggered
        # runs (actions/runner#2788, still open). An empty default would cause
        # checkout to fall back to the repo default branch and package the
        # chart from the wrong commit.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Lint charts
        # The parent `client` chart needs a CI values file so `--strict` sees
        # non-empty clientId / clientPassword (the defaults in values.yaml are
        # deliberately empty to force operators to supply real credentials, and
        # the schema enforces minLength:1). The `ingestor` subchart needs no
        # values file — its only required value (ingestConfig) emits an INFO
        # level, not FAIL, when missing, and customers always supply it via
        # --set-file at install time.
        # Exhaustive multi-platform linting happens in helm-ci.yaml on every
        # PR — here we just need both charts to lint cleanly for packaging.
        run: |
          helm lint --strict ./client -f client/ci/eks-values.yaml
          helm lint --strict ./ingestor

      - name: Package tracebloc charts
        id: package
        # Package BOTH the parent client chart AND the ingestor subchart.
        # Customers run two flavors of install:
        #   1. `helm install tracebloc/client ...` — bootstraps the cluster.
        #   2. `helm install tracebloc/ingestor ...` — per-dataset ingestion.
        # Both must resolve from the same helm repo, so both .tgz files need
        # to live alongside each other in gh-pages and be referenced in a
        # single shared index.yaml. Earlier versions packaged only `./client`
        # and the second install path failed with "chart not found" — see #135.
        run: |
          helm package ./client
          helm package ./ingestor
          echo "Packaged:"
          ls -la *.tgz

      - name: Upload chart artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helm-charts
          # Glob picks up both client-*.tgz and ingestor-*.tgz.
          path: |
            client-*.tgz
            ingestor-*.tgz

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch existing index (gh-pages)
        id: fetch
        run: |
          # Remove any local chart packages before switching branches to avoid
          # "untracked working tree files would be overwritten" checkout errors.
          # Cover both chart name prefixes — see Package step above.
          rm -f client-*.tgz ingestor-*.tgz || true
          if git fetch origin gh-pages 2>/dev/null; then
            git checkout gh-pages
            echo "index_exists=true" >> $GITHUB_OUTPUT
          else
            git checkout --orphan gh-pages
            git reset --hard
            echo "index_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download chart artifacts
        uses: actions/download-artifact@v4
        with:
          name: helm-charts

      - name: Update index and push to gh-pages
        env:
          REPO_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          # `helm repo index .` indexes every .tgz in the working dir, so both
          # client-*.tgz and ingestor-*.tgz get listed in the shared
          # index.yaml. Customers then resolve `tracebloc/client` and
          # `tracebloc/ingestor` from the same repo URL.
          if [ "${{ steps.fetch.outputs.index_exists }}" = "true" ] && [ -f index.yaml ]; then
            helm repo index . --url "$REPO_URL" --merge index.yaml
          else
            helm repo index . --url "$REPO_URL"
          fi
          git add index.yaml client-*.tgz ingestor-*.tgz
          git status
          if git diff --staged --quiet; then
            echo "No index/tgz changes to commit"
          else
            git commit -m "Release helm chart(s): $(ls client-*.tgz ingestor-*.tgz 2>/dev/null | tr '\n' ' ')"
            git push origin gh-pages
          fi

      - name: Upload charts to GitHub Release
        # Pin tag_name from the release event payload rather than relying on
        # github.ref / github.ref_name, which intermittently arrive empty on
        # release-triggered runs (actions/runner#2788, still open).
        # Attach BOTH chart tgzs so downloaders pinning a specific release
        # tag can pull either chart's exact bytes from this release page.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            client-*.tgz
            ingestor-*.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ───────────────────────────────────────────────────────────────────────────
  #  Supply-chain hardening (RFC-0001 R8, backend#889)
  #
  #  The curl|bash bootstrap (scripts/install.sh) refuses to run its sub-scripts
  #  unless it can verify them against a cosign-signed manifest published on THIS
  #  release. This job produces that manifest, signs it keyless (same Sigstore
  #  machinery the CLI binary uses), stamps the published installer with this
  #  immutable tag, and attaches the four assets the bootstrap fetches:
  #     install.sh            (DEFAULT_REF stamped to this tag)
  #     manifest.sha256       (sha256 of every sub-script at this tag)
  #     manifest.sha256.sig   (cosign keyless signature over the manifest)
  #     manifest.sha256.cert  (the signing certificate to verify .sig against)
  #
  #  Verified end-to-end by scripts/tests/install-bootstrap.bats; the release-
  #  notes verification recipe is in docs/SUPPLY_CHAIN.md.
  # ───────────────────────────────────────────────────────────────────────────
  sign-installer-manifest:
    name: Sign installer manifest (R8)
    runs-on: ubuntu-latest
    permissions:
      contents: write   # attach assets to the release
      id-token: write   # cosign keyless OIDC
    steps:
      - name: Checkout the released tag
        # Same actions/runner#2788 guard as above — pin to the release tag so the
        # manifest covers exactly the bytes published at this immutable ref.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        with:
          cosign-release: 'v2.4.1'   # keep in lockstep with scripts/install.sh COSIGN_VERSION

      - name: Generate the sub-script manifest
        # gen-manifest.sh recomputes the manifest from the exact FILES the
        # bootstrap fetches and cross-checks the two lists are in sync (it
        # exits non-zero on drift), so a sub-script can never ship unlisted.
        run: |
          chmod +x scripts/gen-manifest.sh
          scripts/gen-manifest.sh
          echo "── manifest.sha256 ──"
          cat scripts/manifest.sha256

      - name: Sign the manifest (cosign keyless)
        env:
          COSIGN_YES: 'true'
        run: |
          cd scripts
          cosign sign-blob \
            --output-certificate manifest.sha256.cert \
            --output-signature   manifest.sha256.sig \
            manifest.sha256
          echo "Signed manifest.sha256"
          ls -l manifest.sha256*

      - name: Stamp the published installer with this immutable tag
        # The in-repo install.sh carries a placeholder DEFAULT_REF and refuses to
        # run un-stamped (fail-closed). The published artifact is pinned to THIS
        # tag so `curl | bash` of the release asset transitively pins every
        # sub-script. We stamp a copy, never the committed file.
        #
        # SECURITY: the tag is passed via env (NOT interpolated into the run:
        # script). Interpolating `${{ github.event.release.tag_name }}` straight
        # into a shell assignment lets a tag containing a single quote break out
        # and inject shell into THIS job — which holds id-token:write +
        # contents:write, the trust-establishing privileges. As an env var it is
        # plain data; the shell never re-parses it (RFC-0001 R8, backend#889).
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          install -m 0755 scripts/install.sh scripts/install.stamped.sh
          # Replace only the placeholder token; fail loudly if it's absent so a
          # refactor that drops it can't silently publish an un-pinned installer.
          grep -q '__TRACEBLOC_RELEASE_REF__' scripts/install.stamped.sh \
            || { echo "::error::DEFAULT_REF placeholder not found in install.sh"; exit 1; }
          # Robust substitution: do a literal find/replace with awk instead of
          # `sed s|...|...|`, so a tag containing sed-special bytes ('/' as the
          # delimiter, '&' as match-text, '\' as an escape) can't corrupt the
          # stamp or inject regex metacharacters. The index()/substr() loop treats
          # BOTH the placeholder and the replacement (read from ENVIRON, never the
          # command line) as plain strings — no regex, no backreference, no
          # delimiter — so every byte of the tag lands verbatim.
          #
          # Stamp ONLY the `DEFAULT_REF=` assignment line. install.sh's fail-closed
          # guard checks the SAME placeholder token to detect an un-stamped build;
          # a global replace rewrote that guard to the tag too, so it fired on every
          # correctly stamped install — "wasn't stamped" for everyone (the v1.8.1
          # regression, backend#830). Anchoring to the assignment keeps the guard's
          # sentinel intact.
          TAG="$TAG" awk '
            BEGIN { ph = "__TRACEBLOC_RELEASE_REF__"; rep = ENVIRON["TAG"] }
            /^DEFAULT_REF=/ {
              out = ""; line = $0
              while ((p = index(line, ph)) > 0) {
                out = out substr(line, 1, p - 1) rep
                line = substr(line, p + length(ph))
              }
              print out line; next
            }
            { print }
          ' scripts/install.stamped.sh > scripts/install.stamped.sh.new
          mv scripts/install.stamped.sh.new scripts/install.sh
          rm -f scripts/install.stamped.sh
          # Confirm the stamp landed on DEFAULT_REF (published installer pinned to
          # this tag)...
          grep -n 'DEFAULT_REF=' scripts/install.sh
          grep -qF "DEFAULT_REF=\"${TAG}\"" scripts/install.sh \
            || { echo "::error::DEFAULT_REF was not stamped to ${TAG}"; exit 1; }
          # ...and that the surgical stamp left the fail-closed guard's sentinel
          # untouched — a global replace would rewrite it to the tag and fire on
          # every correct install (regression guard for the v1.8.1 clobber).
          grep -qF '"$REF" == "__TRACEBLOC_RELEASE_REF__"' scripts/install.sh \
            || { echo "::error::unstamped-guard sentinel was clobbered by stamping"; exit 1; }

      - name: Self-test the stamped installer parses, accepts its tag, and refuses bad refs
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          bash -n scripts/install.sh
          # POSITIVE PATH — the v1.8.1 regression. With no BRANCH/REF override the
          # installer resolves to its stamped DEFAULT_REF (this tag) and MUST clear
          # the fail-closed guard, i.e. NEVER print "wasn't stamped". It still exits
          # non-zero further on (the signed manifest assets aren't attached to the
          # release until the next step), so we assert only that it got past the
          # guard. `timeout` bounds the network fetch so this can't hang the job.
          out="$(timeout 120 bash scripts/install.sh </dev/null 2>&1 || true)"
          if printf '%s\n' "$out" | grep -q "wasn't stamped"; then
            echo "::error::stamped installer rejected its own pinned tag '${TAG}' — the unstamped-guard was clobbered"
            printf '%s\n' "$out" | head -25
            exit 1
          fi
          echo "stamped installer accepts its pinned tag '${TAG}' (cleared the guard)"
          # NEGATIVE PATH — an un-pinned dev ref without the opt-in must fail closed.
          if BRANCH=some-branch bash scripts/install.sh </dev/null >/dev/null 2>&1; then
            echo "::error::stamped installer did not fail closed on a mutable BRANCH"; exit 1
          fi
          echo "stamped installer fails closed on a mutable ref (expected)"

      - name: Stamp the published PowerShell installer with this immutable tag
        # Windows peer of the install.sh stamp above. install.ps1 carries the same
        # placeholder $DefaultRef and refuses to run un-stamped; the published asset
        # is pinned to THIS tag so `irm .../releases/latest/download/install.ps1 | iex`
        # transitively pins install-k8s.ps1. Same discipline: the tag is passed via
        # env (plain data), and a literal awk find/replace anchored to the
        # `$DefaultRef =` assignment leaves the identical placeholder in the
        # fail-closed guard untouched (a global replace would make every stamped
        # install report "wasn't stamped" — the install.sh v1.8.1 regression).
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          install -m 0644 scripts/install.ps1 scripts/install.stamped.ps1
          grep -q '__TRACEBLOC_RELEASE_REF__' scripts/install.stamped.ps1 \
            || { echo "::error::DefaultRef placeholder not found in install.ps1"; exit 1; }
          TAG="$TAG" awk '
            BEGIN { ph = "__TRACEBLOC_RELEASE_REF__"; rep = ENVIRON["TAG"] }
            /^\$DefaultRef = / {
              out = ""; line = $0
              while ((p = index(line, ph)) > 0) {
                out = out substr(line, 1, p - 1) rep
                line = substr(line, p + length(ph))
              }
              print out line; next
            }
            { print }
          ' scripts/install.stamped.ps1 > scripts/install.stamped.ps1.new
          mv scripts/install.stamped.ps1.new scripts/install.ps1
          rm -f scripts/install.stamped.ps1
          # Confirm the stamp landed on $DefaultRef...
          grep -n 'DefaultRef' scripts/install.ps1 | head -3
          grep -qF "\$DefaultRef = \"${TAG}\"" scripts/install.ps1 \
            || { echo "::error::\$DefaultRef was not stamped to ${TAG}"; exit 1; }
          # ...and that the fail-closed guard's sentinel survived (regression guard).
          grep -qF '$ref -eq "__TRACEBLOC_RELEASE_REF__"' scripts/install.ps1 \
            || { echo "::error::unstamped-guard sentinel was clobbered by stamping"; exit 1; }

      - name: Self-test the stamped PowerShell installer parses + enforces R8 ref rules
        # Windows peer of the install.sh self-test. Runs on the ubuntu runner via
        # pwsh: TB_PESTER=1 loads the functions past the platform gate (which would
        # otherwise exit off-Windows) so we can assert the SAME positive/negative
        # paths — the stamped tag is accepted, a mutable branch fails closed. The
        # full fetch/verify flow is exercised behaviorally by the Windows Pester job.
        shell: pwsh
        env:
          TAG: ${{ github.event.release.tag_name }}
          TB_PESTER: "1"
        run: |
          $errs = $null
          [System.Management.Automation.Language.Parser]::ParseFile("scripts/install.ps1", [ref]$null, [ref]$errs) | Out-Null
          if ($errs) { $errs | ForEach-Object { Write-Host $_ }; Write-Host "::error::install.ps1 has syntax errors after stamping"; exit 1 }
          . ./scripts/install.ps1
          # POSITIVE — no override resolves to the stamped $DefaultRef (this tag) and
          # must be accepted (never throw "wasn't stamped").
          try {
            $ref = Resolve-InstallRef -DefaultRef $DefaultRef -AllowUnverified:$false
          } catch {
            Write-Host "::error::stamped installer rejected its own pinned tag '$($env:TAG)': $_"; exit 1
          }
          if ($ref -ne $env:TAG) { Write-Host "::error::stamped installer resolved '$ref', expected pinned tag '$($env:TAG)'"; exit 1 }
          Write-Host "stamped PowerShell installer accepts its pinned tag '$($env:TAG)'"
          # NEGATIVE — a mutable BRANCH without the opt-in must fail closed (throw).
          try {
            Resolve-InstallRef -DefaultRef $DefaultRef -BranchEnv 'some-branch' -AllowUnverified:$false | Out-Null
            Write-Host "::error::stamped installer did not fail closed on a mutable BRANCH"; exit 1
          } catch {
            Write-Host "stamped PowerShell installer fails closed on a mutable ref (expected)"
          }

      - name: Attach installer + signed manifest to the release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            scripts/install.sh
            scripts/install.ps1
            scripts/manifest.sha256
            scripts/manifest.sha256.sig
            scripts/manifest.sha256.cert
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}