name: Helm Chart CI

on:
  push:
    branches: [main, develop, openshift]
    paths:
      - 'client/**'
      - 'ingestor/**'
      - '.github/workflows/helm-ci.yaml'
  pull_request:
    branches: [main, develop, openshift]
    paths:
      - 'client/**'
      - 'ingestor/**'
      - '.github/workflows/helm-ci.yaml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm lint (strict) — parent client chart, all platforms
        run: |
          for f in client/ci/*-values.yaml; do
            echo "=== Linting client with $f ==="
            helm lint --strict ./client -f "$f"
          done

      - name: Helm lint (strict) — ingestor subchart
        # The ingestor subchart has no per-platform CI values files because
        # its templates don't branch on platform — they only render a
        # ConfigMap + Job + SA. The chart's one required value
        # (`ingestConfig`) is supplied by customers at install time via
        # `--set-file`; missing it during lint emits an INFO, not a FAIL,
        # so plain `helm lint --strict ./ingestor` exercises the templates
        # cleanly. See #135 for why we lint it here at all (publish workflow
        # now packages both charts).
        run: helm lint --strict ./ingestor

  template:
    name: Template render
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [aks, bm, eks, oc]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm template — ${{ matrix.platform }}
        run: |
          helm template test-${{ matrix.platform }} ./client \
            -f client/ci/${{ matrix.platform }}-values.yaml \
            > /tmp/rendered-${{ matrix.platform }}.yaml
          echo "Rendered $(wc -l < /tmp/rendered-${{ matrix.platform }}.yaml) lines"

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Validate Kubernetes manifests
        run: |
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -summary \
            /tmp/rendered-${{ matrix.platform }}.yaml

  unittest:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Install helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version 0.5.2

      - name: Run unit tests
        run: helm unittest ./client

  schema:
    name: Schema validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [aks, bm, eks, oc]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Validate values against schema — ${{ matrix.platform }}
        run: |
          helm template test-${{ matrix.platform }} ./client \
            -f client/ci/${{ matrix.platform }}-values.yaml \
            > /dev/null
          echo "Schema validation passed for ${{ matrix.platform }}"

  ingestor-multiarch:
    # Guard: the chart's PINNED ingestor digest must be a multi-arch index
    # (linux/amd64 + linux/arm64). Greenfield installs spawn the ingestor from this
    # pinned digest (before image-refresh ticks), so an amd64-only pin breaks data
    # ingestion on arm64 hosts (Apple Silicon, Graviton) with ImagePullBackOff. This
    # would have caught #160 (which pinned the amd64-only v0.3.1). See client#186.
    name: Pinned ingestor digest is multi-arch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert images.ingestor.digest supports linux/amd64 + linux/arm64
        run: |
          digest=$(yq '.images.ingestor.digest' client/values.yaml)
          echo "Pinned ingestor digest: $digest"
          if [ -z "$digest" ] || [ "$digest" = "null" ]; then
            echo "::error::images.ingestor.digest is empty — it must be a pinned multi-arch digest."; exit 1
          fi
          plats=$(docker buildx imagetools inspect "ghcr.io/tracebloc/ingestor@$digest" 2>&1 \
            | awk '/Platform:/{print $2}' | grep -v '^unknown' | sort -u)
          echo "Platforms: $(echo "$plats" | paste -sd' ' -)"
          echo "$plats" | grep -qx 'linux/arm64' || { echo "::error::Pinned ingestor digest is NOT multi-arch (no linux/arm64). arm64 installs (Apple Silicon, Graviton) would fail ingestion with 'no match for platform' / ImagePullBackOff. Pin a multi-arch :0.x index. See client#186 / #160."; exit 1; }
          echo "$plats" | grep -qx 'linux/amd64' || { echo "::error::Pinned ingestor digest is missing linux/amd64."; exit 1; }
          echo "OK — pinned ingestor digest is multi-arch (amd64 + arm64)."

  # Installer script tests (bats + Pester) + the cross-distro prerequisite matrix
  # live in their own workflow: .github/workflows/installer-tests.yaml
  # (triggered on scripts/** changes).
