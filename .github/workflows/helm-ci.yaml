name: Helm Chart CI

on:
  push:
    branches: [main, develop, openshift]
    paths:
      - 'client/**'
      - 'ingestor/**'
      - 'scripts/tests/e2e-auto-upgrade.sh'
      - '.github/workflows/helm-ci.yaml'
  pull_request:
    branches: [main, develop, openshift]
    paths:
      - 'client/**'
      - 'ingestor/**'
      - 'scripts/tests/e2e-auto-upgrade.sh'
      - '.github/workflows/helm-ci.yaml'

concurrency:
  # Cancel superseded runs on PRs — this is the repo's heaviest workflow
  # (a real k3d cluster in upgrade-e2e plus two 4-platform matrices). Never
  # cancel push/schedule runs.
  group: helm-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    timeout-minutes: 10
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm lint (strict) — parent client chart, all platforms
        run: |
          for f in client/ci/*-values.yaml; do
            echo "=== Linting client with $f ==="
            helm lint --strict ./client -f "$f"
          done

      - name: Helm lint (strict) — ingestor subchart
        # The ingestor subchart has no per-platform CI values files because
        # its templates don't branch on platform — they only render a
        # ConfigMap + Job + SA. The chart's one required value
        # (`ingestConfig`) is supplied by customers at install time via
        # `--set-file`; missing it during lint emits an INFO, not a FAIL,
        # so plain `helm lint --strict ./ingestor` exercises the templates
        # cleanly. See #135 for why we lint it here at all (publish workflow
        # now packages both charts).
        run: helm lint --strict ./ingestor

  template:
    timeout-minutes: 10
    name: Template render
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [aks, bm, eks, oc]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm template — ${{ matrix.platform }}
        run: |
          helm template test-${{ matrix.platform }} ./client \
            -f client/ci/${{ matrix.platform }}-values.yaml \
            > /tmp/rendered-${{ matrix.platform }}.yaml
          echo "Rendered $(wc -l < /tmp/rendered-${{ matrix.platform }}.yaml) lines"

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Validate Kubernetes manifests
        run: |
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -summary \
            /tmp/rendered-${{ matrix.platform }}.yaml

  unittest:
    timeout-minutes: 10
    name: Helm unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Install helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version 0.5.2

      - name: Run unit tests
        run: helm unittest ./client

  ingestor-multiarch:
    timeout-minutes: 10
    # Guard: the ingestor image the cluster spawns must be a multi-arch index
    # (linux/amd64 + linux/arm64), or arm64 hosts (Apple Silicon, Graviton)
    # fail data ingestion with "no match for platform" / ImagePullBackOff.
    # jobs-manager spawns ingestion Jobs by the floating tag
    # `images.ingestor.tag` (imagePullPolicy=Always) by DEFAULT, so that tag
    # must be multi-arch. If an operator opts into pinning via
    # `images.ingestor.digest` (empty by default), the pinned digest must be
    # multi-arch too. This would have caught #160 (the amd64-only v0.3.1 pin).
    # See client#186.
    name: Spawned ingestor image is multi-arch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert the ingestor tag (and pinned digest, if any) is multi-arch
        run: |
          repo=$(yq '.images.ingestor.repository' client/values.yaml)
          if [ -z "$repo" ] || [ "$repo" = "null" ]; then repo="ghcr.io/tracebloc/ingestor"; fi
          tag=$(yq '.images.ingestor.tag' client/values.yaml)
          digest=$(yq '.images.ingestor.digest' client/values.yaml)

          assert_multiarch() {
            ref="$1"; label="$2"
            echo "Inspecting $label: $ref"
            plats=$(docker buildx imagetools inspect "$ref" 2>&1 \
              | awk '/Platform:/{print $2}' | grep -v '^unknown' | sort -u)
            echo "Platforms: $(echo "$plats" | paste -sd' ' -)"
            echo "$plats" | grep -qx 'linux/arm64' || { echo "::error::$label ($ref) is NOT multi-arch (no linux/arm64). arm64 installs (Apple Silicon, Graviton) would fail ingestion with 'no match for platform' / ImagePullBackOff. See client#186 / #160."; exit 1; }
            echo "$plats" | grep -qx 'linux/amd64' || { echo "::error::$label ($ref) is missing linux/amd64."; exit 1; }
            echo "OK — $label is multi-arch (amd64 + arm64)."
          }

          # The floating tag is the default spawn target — always validate it.
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "::error::images.ingestor.tag is empty — the chart must define a floating tag to spawn by."; exit 1
          fi
          assert_multiarch "${repo}:${tag}" "floating tag"

          # A pinned digest is opt-in (empty by default). When set, it must be multi-arch too.
          if [ -n "$digest" ] && [ "$digest" != "null" ]; then
            assert_multiarch "${repo}@${digest}" "pinned digest"
          else
            echo "images.ingestor.digest empty (default) — spawning by floating tag; no pinned digest to check."
          fi

  upgrade-e2e:
    timeout-minutes: 30
    # Fleet auto-upgrade non-regression gate (client-runtime#102 / #245-class
    # regressions): installs the LAST PUBLISHED chart from gh-pages on a real
    # k3d cluster, then upgrades to THIS working tree via both
    # `--reuse-values` (manual-operator habit; nil-guards must hold, lockdown
    # must not engage) and `--reset-then-reuse-values` (the auto-upgrade
    # cronjob's path; new defaults must flow in inert), then flips the #102
    # egress-lockdown flags and proves the next auto-upgrade preserves them.
    # Pods are never waited on — published images need real credentials; the
    # regression class this guards lives in Helm templating/values semantics.
    name: Fleet auto-upgrade E2E (k3d)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upgrade from last published release through both flag paths
        run: bash scripts/tests/e2e-auto-upgrade.sh

  # Installer script tests (bats + Pester) + the cross-distro prerequisite matrix
  # live in their own workflow: .github/workflows/installer-tests.yaml
  # (triggered on scripts/** changes).
