name: Helm Chart CI

on:
  push:
    branches: [main, openshift]
    paths:
      - 'client/**'
      - 'ingestor/**'
      - '.github/workflows/helm-ci.yaml'
  pull_request:
    branches: [main, openshift]
    paths:
      - 'client/**'
      - 'ingestor/**'
      - '.github/workflows/helm-ci.yaml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm lint (strict) — parent client chart, all platforms
        run: |
          for f in client/ci/*-values.yaml; do
            echo "=== Linting client with $f ==="
            helm lint --strict ./client -f "$f"
          done

      - name: Helm lint (strict) — ingestor subchart
        # The ingestor subchart has no per-platform CI values files because
        # its templates don't branch on platform — they only render a
        # ConfigMap + Job + SA. The chart's one required value
        # (`ingestConfig`) is supplied by customers at install time via
        # `--set-file`; missing it during lint emits an INFO, not a FAIL,
        # so plain `helm lint --strict ./ingestor` exercises the templates
        # cleanly. See #135 for why we lint it here at all (publish workflow
        # now packages both charts).
        run: helm lint --strict ./ingestor

  template:
    name: Template render
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [aks, bm, eks, oc]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm template — ${{ matrix.platform }}
        run: |
          helm template test-${{ matrix.platform }} ./client \
            -f client/ci/${{ matrix.platform }}-values.yaml \
            > /tmp/rendered-${{ matrix.platform }}.yaml
          echo "Rendered $(wc -l < /tmp/rendered-${{ matrix.platform }}.yaml) lines"

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Validate Kubernetes manifests
        run: |
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -summary \
            /tmp/rendered-${{ matrix.platform }}.yaml

  unittest:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Install helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version 0.5.2

      - name: Run unit tests
        run: helm unittest ./client

  schema:
    name: Schema validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [aks, bm, eks, oc]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Validate values against schema — ${{ matrix.platform }}
        run: |
          helm template test-${{ matrix.platform }} ./client \
            -f client/ci/${{ matrix.platform }}-values.yaml \
            > /dev/null
          echo "Schema validation passed for ${{ matrix.platform }}"
