# ============================================================
# Tracebloc Unified Helm Chart — values.yaml
# ============================================================
# This chart supports AKS, EKS, bare-metal (bm), and OpenShift (oc).
# Platform-specific behaviour is controlled by the values below.
# Use per-environment value files (e.g. ci/aks-values.yaml) to override.

# -- Jobs manager configuration
jobsManager:
  tag: dev
  env:
    CLIENT_ID: "<CLIENT_ID>"
    # Optional proxy settings
    HTTP_PROXY_HOST: ""
    HTTP_PROXY_PORT: ""
    HTTP_PROXY_USERNAME: ""
    HTTP_PROXY_PASSWORD: ""
    # Default resource requests/limits for spawned training jobs
    RESOURCE_REQUESTS: "cpu=2,memory=8Gi"
    RESOURCE_LIMITS: "cpu=2,memory=8Gi"
    # GPU support (e.g. "nvidia.com/gpu=1")
    GPU_REQUESTS: ""
    GPU_LIMITS: ""
    # Runtime class for GPU jobs (required on k3s/OpenShift, leave empty otherwise)
    RUNTIME_CLASS_NAME: ""

# -- StorageClass configuration
# Set create: false to use an existing storage class
storageClass:
  create: true
  name: client-storage-class
  provisioner: ""
  allowVolumeExpansion: true
  # Optional fields — omitted from rendered YAML when empty
  volumeBindingMode: ""
  reclaimPolicy: ""
  mountOptions: []
  parameters: {}

# -- Bare-metal only: hostPath-backed PersistentVolumes
# When enabled, a PV + PVC pair is created for each volume.
# When disabled, only dynamic PVCs are created (AKS/EKS/OC pattern).
hostPath:
  enabled: false
  dataPath: ""
  logsPath: ""
  mysqlPath: ""
  # Pre-install Job to create host directories with correct permissions
  initJob: true

# -- PVC access mode (ReadWriteMany for dynamic, ReadWriteOnce for hostPath)
# Override per-environment if needed
pvcAccessMode: ReadWriteMany

# -- Shared data PVC
clientData:
  name: client-pvc
  storage: 50Gi

# -- Logs PVC
clientLogsPvc:
  name: client-logs-pvc
  storage: 10Gi

# -- MySQL PVC
mysqlPvc:
  name: mysql-pvc
  storage: 2Gi

# -- MySQL deployment
mysql:
  name: mysql-client

# -- RBAC configuration
clusterRole:
  create: true
  name: jobs-manager-rbac
  # Set to false for namespace-scoped RBAC (recommended for OpenShift without cluster-admin)
  useClusterScope: true

# -- Resource monitor DaemonSet (node-level metrics collection)
resourceMonitor:
  enabled: true

# -- OpenShift-specific settings
openshift:
  # Create a SecurityContextConstraints allowing hostPath for the resource monitor
  scc:
    enabled: false

# -- Secrets
secrets:
  create: true
  clientPassword: "<CLIENT_PASSWORD>"

# -- Docker registry credentials
# Secret name is auto-generated as {{ .Release.Name }}-regcred
dockerRegistry:
  create: true
  server: https://index.docker.io/v1/
  username: "<DOCKER_USERNAME>"
  password: "<DOCKER_REGISTRY_TOKEN>"
  email: "<DOCKER_EMAIL>"
