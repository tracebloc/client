suite: RBAC
templates:
  - templates/rbac.yaml
set:
  clientId: "test-id"
  clientPassword: "test"
  dockerRegistry:
    server: https://index.docker.io/v1/
    username: test
    password: test
    email: test@test.com
tests:
  - it: should create ServiceAccount
    set:
      clusterScope: true
    documentIndex: 0
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-jobs-manager

  - it: should create ClusterRole when clusterScope is true
    set:
      clusterScope: true
    documentIndex: 1
    asserts:
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: RELEASE-NAME-jobs-manager-rbac

  - it: should create ClusterRoleBinding when clusterScope is true
    set:
      clusterScope: true
    documentIndex: 2
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: subjects[0].name
          value: RELEASE-NAME-jobs-manager

  - it: should create Role when clusterScope is false
    set:
      clusterScope: false
    documentIndex: 1
    asserts:
      - isKind:
          of: Role

  - it: should create RoleBinding when clusterScope is false
    set:
      clusterScope: false
    documentIndex: 2
    asserts:
      - isKind:
          of: RoleBinding

  - it: should have least-privilege rules for jobs-manager
    set:
      clusterScope: true
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["batch"]
            resources: ["jobs"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods", "pods/log", "events"]
            verbs: ["get", "list", "watch"]
