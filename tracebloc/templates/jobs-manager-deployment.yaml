apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-jobs-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tracebloc.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: manager
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: manager
    spec:
      terminationGracePeriodSeconds: 60
      serviceAccountName: {{ include "tracebloc.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api
        image: {{ include "tracebloc.image" (dict "repository" "tracebloc/jobs-manager" "tag" .Values.jobsManager.tag "registry" "docker.io") | quote }}
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
          - name: shared-volume
            mountPath: "/data/shared"
          - name: logs-volume
            mountPath: "/data/logs"
        env:
        - name: CLIENT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "tracebloc.secretName" . }}
              key: CLIENT_PASSWORD
        - name: CLIENT_PVC
          value: {{ .Values.clientData.name | default "client-pvc" | quote }}
        - name: CLIENT_LOGS_PVC
          value: {{ .Values.clientLogsPvc.name | default "client-logs-pvc" | quote }}
        - name: MYSQL_HOST
          value: {{ .Values.mysql.name | quote }}
        - name: JOB_IMAGE_HOST
          value: "docker.io/"
        - name: CLIENT_ENV
          value: {{ .Values.jobsManager.env.CLIENT_ENV | default "prod" | quote }}
        {{- range $key, $value := .Values.jobsManager.env }}
        {{- if and (ne $key "CLIENT_ENV") $value }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
      - name: pods-monitor-container
        image: {{ include "tracebloc.image" (dict "repository" "tracebloc/pods-monitor" "tag" .Values.jobsManager.tag "registry" "docker.io") | quote }}
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - name: logs-volume
          mountPath: "/data/logs"
        env:
        - name: CLIENT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "tracebloc.secretName" . }}
              key: CLIENT_PASSWORD
        - name: CLIENT_LOGS_PVC
          value: {{ .Values.clientLogsPvc.name | default "client-logs-pvc" | quote }}
        - name: JOB_IMAGE_HOST
          value: "docker.io/"
        - name: CLIENT_ENV
          value: {{ .Values.jobsManager.env.CLIENT_ENV | default "prod" | quote }}
        {{- range $key, $value := .Values.jobsManager.env }}
        {{- if and (ne $key "CLIENT_ENV") $value }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
      imagePullSecrets:
      - name: {{ include "tracebloc.registrySecretName" . }}
      volumes:
        - name: shared-volume
          persistentVolumeClaim:
            claimName: {{ .Values.clientData.name | default "client-pvc" }}
        - name: logs-volume
          persistentVolumeClaim:
            claimName: {{ .Values.clientLogsPvc.name | default "client-logs-pvc" }}
      restartPolicy: Always
