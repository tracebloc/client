{{- if .Values.hostPath.enabled }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.clientData.name }}
  labels:
    {{- include "tracebloc.labels" . | nindent 4 }}
spec:
  storageClassName: {{ .Values.storageClass.name }}
  capacity:
    storage: {{ .Values.clientData.storage }}
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: {{ required "hostPath.dataPath is required when hostPath.enabled" .Values.hostPath.dataPath }}
---
{{- end }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.clientData.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
  labels:
    {{- include "tracebloc.labels" . | nindent 4 }}
spec:
  storageClassName: {{ .Values.storageClass.name }}
  accessModes:
    - {{ .Values.pvcAccessMode | default "ReadWriteMany" }}
  resources:
    requests:
      storage: {{ .Values.clientData.storage }}
