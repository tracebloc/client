{{- if and .Values.hostPath.enabled .Values.hostPath.initJob }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-create-directories
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": hook-succeeded
  labels:
    {{- include "tracebloc.labels" . | nindent 4 }}
spec:
  template:
    spec:
      containers:
      - name: create-dirs
        image: busybox:1.35
        command: ["/bin/sh", "-c"]
        args:
        - |
          mkdir -p {{ .Values.hostPath.dataPath }}
          mkdir -p {{ .Values.hostPath.logsPath }}
          mkdir -p {{ .Values.hostPath.mysqlPath }}
          chmod -R 777 {{ .Values.hostPath.dataPath }}
          chmod -R 777 {{ .Values.hostPath.logsPath }}
          chmod -R 777 {{ .Values.hostPath.mysqlPath }}
      restartPolicy: OnFailure
{{- end }}
