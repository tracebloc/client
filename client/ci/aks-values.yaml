# AKS (Azure Kubernetes Service) platform values
storageClass:
  create: true
  provisioner: file.csi.azure.com
  parameters:
    skuName: Standard_LRS
  mountOptions:
    - dir_mode=0750
    - file_mode=0640
    - uid=999
    - gid=999
    - mfsymlinks
    - cache=strict
    - actimeo=30

clusterScope: true

# NetworkPolicy: AKS requires the cluster to be created with Azure NPM
# (`--network-policy azure`) or with Calico to enforce NetworkPolicies.
# Leave enabled here; document the cluster-creation requirement in README.
networkPolicy:
  training:
    enabled: true

clientId: "ci-test-id"
clientPassword: "ci-test-password"

dockerRegistry:
  username: ci-test
  password: ci-test
  email: ci@test.com
