# Bare-metal platform values (PV paths are fixed: /tracebloc/data, /tracebloc/logs, /tracebloc/mysql)
hostPath:
  enabled: true

pvcAccessMode: ReadWriteOnce

storageClass:
  create: true
  provisioner: kubernetes.io/no-provisioner
  mountOptions:
    - dir_mode=0750
    - file_mode=0640
    - uid=1000
    - gid=1000

clusterScope: true

# NetworkPolicy: bare-metal enforcement depends on the CNI installed.
# Calico / Cilium / kube-router enforce. Flannel alone does NOT.
# Leave enabled here; customers on Flannel-only installations must override.
networkPolicy:
  training:
    enabled: true

clientId: "ci-test-id"
clientPassword: "ci-test-password"

dockerRegistry:
  username: ci-test
  password: ci-test
  email: ci@test.com
