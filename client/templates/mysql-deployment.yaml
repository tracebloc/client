apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-client
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tracebloc.labels" . | nindent 4 }}
    app: mysql-client
spec:
  selector:
    matchLabels:
      app: mysql-client
  strategy:
    type: Recreate
  replicas: 1
  template:
    metadata:
      labels:
        app: mysql-client
    spec:
      terminationGracePeriodSeconds: 60
      {{- /*
        Reference the PriorityClass whenever a name is set, regardless of
        priorityClass.create. Operators on GitOps / shared-platform setups
        manage the PriorityClass out-of-band (create: false) but still want
        the pod to reference it — gating on `create` would silently strip
        the OOM protection this chart's mysql tuning relies on.
      */}}
      {{- with .Values.priorityClass.name }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: "OnRootMismatch"
      {{- if .Values.hostPath.enabled }}
      # kubelet does not apply fsGroup to hostPath volumes
      # (kubernetes/kubernetes#138411), so bare-metal installs need a
      # privileged bootstrap to chown /var/lib/mysql to 999:999. CSI-backed
      # deployments (EKS/AKS/OC) skip this and rely on fsGroup.
      initContainers:
      - name: init-mysql-data
        image: {{ include "tracebloc.image" (dict "repository" "library/busybox" "tag" .Values.images.busybox.tag "digest" .Values.images.busybox.digest "registry" "docker.io") | quote }}
        # Must run as root to chown the hostPath mount; kubelet does not apply
        # fsGroup to hostPath volumes (kubernetes/kubernetes#138411).
        # Scope privilege tightly: only CHOWN is needed — no FOWNER, so do not
        # chmod here. On re-install the dir is already owned by 999, and
        # chmod-by-non-owner without CAP_FOWNER returns EPERM (kubelet creates
        # the dir 0755 via DirectoryOrCreate, so chmod was a no-op anyway).
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
            add: ["CHOWN"]
          seccompProfile:
            type: RuntimeDefault
        command: ['sh', '-c', 'chown 999:999 /var/lib/mysql']
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql/
      {{- end }}
      containers:
      - image: {{ include "tracebloc.image" (dict "repository" "tracebloc/mysql-client" "tag" (.Values.images.mysqlClient.tag | default "prod") "digest" .Values.images.mysqlClient.digest "registry" "docker.io") | quote }}
        imagePullPolicy: IfNotPresent
        name: mysql-client
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
          runAsGroup: 999
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        # requests.memory == limits.memory pins the cgroup memory budget so
        # mysqld is never the largest victim during node-level OOM. CPU limit
        # is intentionally omitted: throttled CPU causes InnoDB lock-wait
        # timeouts (mysqld can't service heartbeats) and is a far more common
        # cause of mysql crashes than a noisy neighbour. PriorityClass +
        # PodDisruptionBudget cover the eviction angle instead.
        resources:
          requests:
            memory: {{ .Values.resources.mysql.requests.memory | default "1Gi" | quote }}
            cpu: {{ .Values.resources.mysql.requests.cpu | default "250m" | quote }}
          limits:
            memory: {{ .Values.resources.mysql.limits.memory | default "1Gi" | quote }}
            {{- /*
              CPU limit is intentionally unset by default (see comment block
              above). Schema permits it, so honour an explicit override here
              instead of silently dropping it. Operators flipping this on
              should know what they're doing.
            */}}
            {{- with .Values.resources.mysql.limits.cpu }}
            cpu: {{ . | quote }}
            {{- end }}
        ports:
        - containerPort: 3306
          name: mysql-client
        # timeoutSeconds defaults to 1; under CPU contention `mysqladmin ping`
        # routinely needs >1s to even spawn, which kubelet reports as a probe
        # failure and kills the container. 5s is generous enough to survive
        # transient CPU pressure but still catch a real hang within ~25s.
        startupProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "localhost"]
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 24
        livenessProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "localhost"]
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "localhost"]
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql/
        - name: mysql-config
          mountPath: /etc/mysql/conf.d/
        - name: mysql-logs
          mountPath: /var/log/mysql/
        # Writable scratch dirs required by mysqld under readOnlyRootFilesystem:
        # /var/run/mysqld -> pid file + unix socket
        # /tmp            -> temp tables, sort buffers, LOAD DATA staging
        # /var/lib/mysql-files -> default secure_file_priv; mysqld touches it at start
        - name: mysql-run
          mountPath: /var/run/mysqld
        - name: mysql-tmp
          mountPath: /tmp
        - name: mysql-files
          mountPath: /var/lib/mysql-files
      {{- if include "tracebloc.useImagePullSecrets" . }}
      imagePullSecrets:
      - name: {{ include "tracebloc.registrySecretName" . }}
      {{- end }}
      volumes:
      - name: mysql-persistent-storage
        persistentVolumeClaim:
          claimName: {{ include "tracebloc.mysqlPvc" . }}
      - name: mysql-config
        configMap:
          name: mysql-client-config
      - name: mysql-logs
        emptyDir: {}
      - name: mysql-run
        emptyDir: {}
      - name: mysql-tmp
        emptyDir: {}
      - name: mysql-files
        emptyDir: {}
