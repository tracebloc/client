{{- /* #229/#238: when HTTP_PROXY_HOST is set, tracebloc.proxyEnv owns these keys — it emits HTTP(S)_PROXY and a merged, cluster-safe NO_PROXY. Exclude them from the generic .Values.env passthrough below so a user-set NO_PROXY (or proxy var) is not re-emitted UNMERGED after proxyEnv — Kubernetes keeps the LAST duplicate env, which would drop the cluster-internal NO_PROXY entries and route in-cluster traffic through the proxy. When HTTP_PROXY_HOST is UNSET, proxyEnv renders nothing, so the exclusion list stays empty and the passthrough still emits a directly-set env.HTTP_PROXY / NO_PROXY — the pre-1.6.0 way to configure a corporate proxy. Dropping those unconditionally was an upgrade regression (#238): gate the exclusion on proxyEnv being active. */ -}}
{{- $proxyKeys := list -}}
{{- if .Values.env.HTTP_PROXY_HOST -}}
{{- $proxyKeys = list "HTTP_PROXY_HOST" "HTTP_PROXY_PORT" "HTTP_PROXY_USERNAME" "HTTP_PROXY_PASSWORD" "NO_PROXY" "no_proxy" "HTTP_PROXY" "HTTPS_PROXY" "http_proxy" "https_proxy" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-jobs-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tracebloc.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: manager
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: manager
    spec:
      terminationGracePeriodSeconds: 60
      serviceAccountName: {{ include "tracebloc.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api
        image: {{ include "tracebloc.image" (dict "repository" "tracebloc/jobs-manager" "tag" .Values.env.CLIENT_ENV "digest" .Values.images.jobsManager.digest "registry" "docker.io") | quote }}
        imagePullPolicy: {{ if .Values.images.jobsManager.digest }}IfNotPresent{{ else }}Always{{ end }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        # 256Mi was too tight under load: on a busy cluster the Service Bus
        # client + pod-event watcher push RSS over 256Mi within minutes, the
        # pod becomes the OOM-killer's preferred target on the node, and
        # mysqld dies as collateral. 512Mi/1Gi covers steady state with
        # headroom; revisit if heap profiling shows the working set growing.
        resources:
          requests:
            cpu: {{ .Values.resources.jobsManager.requests.cpu | default "100m" | quote }}
            memory: {{ .Values.resources.jobsManager.requests.memory | default "512Mi" | quote }}
          limits:
            cpu: {{ .Values.resources.jobsManager.limits.cpu | default "1000m" | quote }}
            memory: {{ .Values.resources.jobsManager.limits.memory | default "1Gi" | quote }}
        ports:
          # client-runtime#21: POST /internal/submit-ingestion-run. The
          # ingestor subchart's post-install hook hits this through the
          # jobs-manager Service. Cluster-internal only.
          - name: http
            containerPort: 8080
            protocol: TCP
        volumeMounts:
          - name: shared-volume
            mountPath: "/data/shared"
          - name: logs-volume
            mountPath: "/data/logs"
          # ingestion-authz policy read by jobs-manager at startup. The
          # subPath mount means an authz update via `helm upgrade` is
          # picked up on the next jobs-manager restart, not hot-reloaded.
          - name: ingestion-authz
            mountPath: /etc/tracebloc/ingestion-authz.yaml
            subPath: ingestion-authz.yaml
            readOnly: true
        env:
        {{- include "tracebloc.proxyEnv" . | nindent 8 }}
        - name: CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "tracebloc.secretName" . }}
              key: CLIENT_ID
        - name: CLIENT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "tracebloc.secretName" . }}
              key: CLIENT_PASSWORD
        # client-runtime#79: shared HMAC secret used to MINT the per-pod
        # REQUESTS_PROXY_TOKEN. Same Secret key the requests-proxy reads to
        # verify. When present, spin_job mints stateless signed tokens (no
        # pod_tokens table). Never injected into training pods.
        - name: POD_TOKEN_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "tracebloc.secretName" . }}
              key: POD_TOKEN_SIGNING_SECRET
        - name: POD_TOKEN_TTL_SECONDS
          value: {{ .Values.podTokenTtlSeconds | default 604800 | quote }}
        - name: CLIENT_PVC
          value: {{ include "tracebloc.clientDataPvc" . | quote }}
        - name: CLIENT_LOGS_PVC
          value: {{ include "tracebloc.clientLogsPvc" . | quote }}
        - name: MYSQL_HOST
          value: "mysql-client"
        # Ingestor image wiring for the POST /internal/submit-ingestion-run
        # endpoint. jobs-manager spawns each ingestion Job from these values
        # (see client-runtime submit_ingestion_run._build_image_reference).
        #
        # Default (digest empty): spawn by the floating tag with
        # imagePullPolicy=Always, so every ingestion Job resolves the current
        # published ingestor digest at spawn time — exactly how training pods
        # are spawned. There is no chart-pinned digest to keep current, so a
        # `helm upgrade` that resets values can no longer revert the ingestor
        # image (the regression behind the customer "non-numeric" report). The
        # image-refresh CronJob no longer touches the ingestor — its class-2
        # pass was retired in favour of this.
        #
        # Pinning is opt-in: set `images.ingestor.digest` to a canonical
        # multi-arch digest to lock every ingestion Job to that exact image
        # (imagePullPolicy then drops to IfNotPresent for reproducibility —
        # debugging a release before rollout, certification, air-gapped repro).
        # Repository + tag are overridable for private mirrors. All three are
        # nil-guarded so `--reuse-values` from a release that predates the
        # `images.ingestor` key still renders.
        - name: INGESTOR_IMAGE_REPOSITORY
          value: {{ (default dict .Values.images.ingestor).repository | default "ghcr.io/tracebloc/ingestor" | quote }}
        - name: INGESTOR_IMAGE_TAG
          value: {{ (default dict .Values.images.ingestor).tag | default "0.5" | quote }}
        - name: INGESTOR_IMAGE_DIGEST
          value: {{ (default dict .Values.images.ingestor).digest | default "" | quote }}
        - name: REQUESTS_PROXY_URL
          value: "http://requests-proxy-service:8888"
        {{- if and (default dict .Values.egressProxy).enabled (default dict .Values.egressProxy).routeWorkloads }}
        # client-runtime#102: when routing is enabled, jobs-manager injects
        # HTTPS_PROXY=<gateway> into training pods (and suppresses raw HTTP_PROXY_HOST).
        # Inert until egressProxy.routeWorkloads=true.
        - name: EGRESS_PROXY_URL
          value: "http://egress-proxy-service:{{ (default dict .Values.egressProxy).port | default 3128 }}"
        {{- end }}
        - name: JOB_IMAGE_HOST
          value: "docker.io/"
        - name: CLIENT_ENV
          value: {{ .Values.env.CLIENT_ENV | default "prod" | quote }}
        - name: RESOURCE_REQUESTS
          value: {{ if hasKey .Values.env "RESOURCE_REQUESTS" }}{{ .Values.env.RESOURCE_REQUESTS | quote }}{{ else }}"cpu=2,memory=8Gi"{{ end }}
        - name: RESOURCE_LIMITS
          value: {{ if hasKey .Values.env "RESOURCE_LIMITS" }}{{ .Values.env.RESOURCE_LIMITS | quote }}{{ else }}"cpu=2,memory=8Gi"{{ end }}
        - name: GPU_REQUESTS
          value: {{ if hasKey .Values.env "GPU_REQUESTS" }}{{ .Values.env.GPU_REQUESTS | quote }}{{ else }}"nvidia.com/gpu=1"{{ end }}
        - name: GPU_LIMITS
          value: {{ if hasKey .Values.env "GPU_LIMITS" }}{{ .Values.env.GPU_LIMITS | quote }}{{ else }}"nvidia.com/gpu=1"{{ end }}
        - name: RUNTIME_CLASS_NAME
          value: {{ if hasKey .Values.env "RUNTIME_CLASS_NAME" }}{{ .Values.env.RUNTIME_CLASS_NAME | quote }}{{ else }}""{{ end }}
        # client-runtime#92: gates jobs-manager's GPU->CPU pending-job fallback.
        # Default tracks hostPath.enabled — a fixed single-host cluster
        # (installer-provisioned k3d / bare-metal hostPath) applies the hard
        # CPU-or-GPU rule (downgrade a Pending GPU pod to CPU); managed
        # dynamic-PVC clusters (EKS/AKS/OpenShift, hostPath.enabled=false) leave
        # a Pending GPU pod for the autoscaler instead of prematurely
        # downgrading. An explicit env.SINGLE_NODE always wins. Emitted as a
        # quoted string (schema: env.additionalProperties is string); the
        # runtime parses true/false. hostPath is nil-guarded so a pre-this-key
        # --reset-then-reuse-values upgrade can't crash templating.
        - name: SINGLE_NODE
          value: {{ if hasKey .Values.env "SINGLE_NODE" }}{{ .Values.env.SINGLE_NODE | quote }}{{ else }}{{ (default dict .Values.hostPath).enabled | default false | quote }}{{ end }}
        {{- range $key, $value := .Values.env }}
        {{- if and (ne $key "CLIENT_ENV") (ne $key "RESOURCE_REQUESTS") (ne $key "RESOURCE_LIMITS") (ne $key "GPU_REQUESTS") (ne $key "GPU_LIMITS") (ne $key "RUNTIME_CLASS_NAME") (ne $key "SINGLE_NODE") (ne $key "CLIENT_ID") (not (has $key $proxyKeys)) $value }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
      - name: pods-monitor-container
        image: {{ include "tracebloc.image" (dict "repository" "tracebloc/pods-monitor" "tag" .Values.env.CLIENT_ENV "digest" .Values.images.podsMonitor.digest "registry" "docker.io") | quote }}
        imagePullPolicy: {{ if .Values.images.podsMonitor.digest }}IfNotPresent{{ else }}Always{{ end }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: {{ .Values.resources.podsMonitor.requests.cpu | default "50m" | quote }}
            memory: {{ .Values.resources.podsMonitor.requests.memory | default "256Mi" | quote }}
          limits:
            cpu: {{ .Values.resources.podsMonitor.limits.cpu | default "500m" | quote }}
            memory: {{ .Values.resources.podsMonitor.limits.memory | default "512Mi" | quote }}
        volumeMounts:
        - name: logs-volume
          mountPath: "/data/logs"
        env:
        {{- include "tracebloc.proxyEnv" . | nindent 8 }}
        - name: CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "tracebloc.secretName" . }}
              key: CLIENT_ID
        - name: CLIENT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "tracebloc.secretName" . }}
              key: CLIENT_PASSWORD
        - name: CLIENT_LOGS_PVC
          value: {{ include "tracebloc.clientLogsPvc" . | quote }}
        - name: JOB_IMAGE_HOST
          value: "docker.io/"
        - name: CLIENT_ENV
          value: {{ .Values.env.CLIENT_ENV | default "prod" | quote }}
        - name: RESOURCE_REQUESTS
          value: {{ if hasKey .Values.env "RESOURCE_REQUESTS" }}{{ .Values.env.RESOURCE_REQUESTS | quote }}{{ else }}"cpu=2,memory=8Gi"{{ end }}
        - name: RESOURCE_LIMITS
          value: {{ if hasKey .Values.env "RESOURCE_LIMITS" }}{{ .Values.env.RESOURCE_LIMITS | quote }}{{ else }}"cpu=2,memory=8Gi"{{ end }}
        - name: GPU_REQUESTS
          value: {{ if hasKey .Values.env "GPU_REQUESTS" }}{{ .Values.env.GPU_REQUESTS | quote }}{{ else }}"nvidia.com/gpu=1"{{ end }}
        - name: GPU_LIMITS
          value: {{ if hasKey .Values.env "GPU_LIMITS" }}{{ .Values.env.GPU_LIMITS | quote }}{{ else }}"nvidia.com/gpu=1"{{ end }}
        - name: RUNTIME_CLASS_NAME
          value: {{ if hasKey .Values.env "RUNTIME_CLASS_NAME" }}{{ .Values.env.RUNTIME_CLASS_NAME | quote }}{{ else }}""{{ end }}
        # Kept in sync with the api container (client-runtime#92). pods-monitor
        # does not consume SINGLE_NODE, but injecting it here keeps both env
        # blocks + their range-exclusion lists symmetric, matching how
        # GPU_REQUESTS et al. are already handled.
        - name: SINGLE_NODE
          value: {{ if hasKey .Values.env "SINGLE_NODE" }}{{ .Values.env.SINGLE_NODE | quote }}{{ else }}{{ (default dict .Values.hostPath).enabled | default false | quote }}{{ end }}
        {{- range $key, $value := .Values.env }}
        {{- if and (ne $key "CLIENT_ENV") (ne $key "RESOURCE_REQUESTS") (ne $key "RESOURCE_LIMITS") (ne $key "GPU_REQUESTS") (ne $key "GPU_LIMITS") (ne $key "RUNTIME_CLASS_NAME") (ne $key "SINGLE_NODE") (ne $key "CLIENT_ID") (not (has $key $proxyKeys)) $value }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
      {{- if include "tracebloc.useImagePullSecrets" . }}
      imagePullSecrets:
      - name: {{ include "tracebloc.registrySecretName" . }}
      {{- end }}
      volumes:
        - name: shared-volume
          persistentVolumeClaim:
            claimName: {{ include "tracebloc.clientDataPvc" . }}
        - name: logs-volume
          persistentVolumeClaim:
            claimName: {{ include "tracebloc.clientLogsPvc" . }}
        - name: ingestion-authz
          configMap:
            name: {{ .Release.Name }}-ingestion-authz
      restartPolicy: Always
