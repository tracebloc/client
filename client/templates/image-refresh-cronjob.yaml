{{- if include "tracebloc.imageRefreshEnabled" . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tracebloc.imageRefreshName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tracebloc.labels" . | nindent 4 }}
    app.kubernetes.io/component: image-refresh
data:
  image-refresh.sh: |
    #!/bin/sh
    # Polls registries for new manifest digests and reconciles them onto
    # the jobs-manager Deployment. Handles two image classes with
    # different reconciliation semantics:
    #
    #   1. Long-running container images (jobs-manager, pods-monitor) on
    #      docker.io under the floating CLIENT_ENV tag (#154).
    #      Action on change: `kubectl rollout restart` the deployment.
    #      Source of truth: an annotation on the deployment metadata
    #      (`tracebloc.io/last-refreshed-<image>-digest`) — comparing
    #      the registry digest to an annotation we wrote ourselves
    #      sidesteps imageID format variation across container runtimes
    #      (kubernetes/kubernetes#108689 + #115199) and multi-arch
    #      manifest-list vs platform-manifest divergence.
    #
    #   2. Spawned-Job image (ingestor) on ghcr.io under
    #      images.ingestor.tag (#158). This image isn't a container in
    #      the jobs-manager pod — it's the image jobs-manager USES when
    #      spawning each ingestion Job, surfaced via the
    #      INGESTOR_IMAGE_DIGEST env var on the api container.
    #      Action on change: `kubectl set env` to patch the env var,
    #      which triggers a natural rollout via ReplicaSet rotation —
    #      no explicit `rollout restart` needed. Source of truth: the
    #      live env value itself (no annotation needed; the env IS the
    #      digest jobs-manager will use when spawning the next Job).
    #
    # First-tick contract:
    #   * Class 1 (annotation missing): record current digest WITHOUT
    #     restarting — no evidence of drift, no reason to churn pods.
    #   * Class 2: the env is non-empty by chart default (otherwise
    #     jobs-manager would 503 on every ingestion submit), so there
    #     is no "first observation" empty-state. Each tick is a
    #     normal compare-and-patch-if-different.
    #
    # Parsing: awk/sed/grep + jq. jq used only where JSON-with-dotted-
    # keys or container/env-array filtering motivates it; the rest
    # stays in pure shell so the script survives image swaps to leaner
    # bases — same constraint as the auto-upgrade script in this chart.
    #
    # All log() output goes to stderr so it never pollutes
    # command-substitution capture sites like `latest="$(...)"`.
    set -eu

    log() { printf '[image-refresh] %s\n' "$*" >&2; }

    log "release=$RELEASE_NAME namespace=$RELEASE_NAMESPACE deployment=$DEPLOYMENT_NAME"
    log "  client images: tracebloc/{jobs-manager,pods-monitor} on docker.io under tag=$IMAGE_TAG"
    log "  ingestor image: tracebloc/ingestor on ghcr.io under tag=$INGESTOR_TAG (pinned=$INGESTOR_PINNED)"

    # Get an anonymous pull-scope token for one repository on a
    # registry. Both docker.io and ghcr.io support anonymous tokens for
    # public images; only the issuer URL differs. tr cleanup handles
    # the trailing newline some curl builds emit.
    get_token() {
      _repo="$1"; _registry="$2"
      case "$_registry" in
        docker.io)
          _url="https://auth.docker.io/token?service=registry.docker.io&scope=repository:${_repo}:pull"
          ;;
        ghcr.io)
          _url="https://ghcr.io/token?service=ghcr.io&scope=repository:${_repo}:pull"
          ;;
        *)
          log "  WARN: unknown registry $_registry"
          return 1
          ;;
      esac
      curl -fsS --max-time 10 "$_url" \
        | sed -n 's/.*"token":"\([^"]*\)".*/\1/p' \
        | tr -d '\r\n'
    }

    # Resolve the manifest digest for repo:tag on a registry. We HEAD
    # the manifest endpoint with all four manifest media types in a
    # single comma-separated Accept header (registry v2 spec form; some
    # TLS-terminating proxies have been observed dropping repeated
    # Accept headers). The value returned in Docker-Content-Digest is
    # whatever the registry serves for that tag — for multi-arch tags
    # the index digest, for single-arch the manifest digest. Both work
    # here because we compare to OUR annotation (or live env), not to a
    # runtime imageID; tick-over-tick consistency is all we need.
    #
    # Case-fold with tr BEFORE awk: alpine/k8s ships BusyBox awk which
    # silently ignores gawk's IGNORECASE=1, and the header case differs
    # between HTTP/1.1 and HTTP/2. Digest values are lowercase-by-spec
    # (sha256:<64 hex>) so the value is unaffected.
    get_latest_digest() {
      _repo="$1"; _tag="$2"; _registry="$3"
      _token="$(get_token "$_repo" "$_registry")"
      if [ -z "$_token" ]; then
        log "  WARN: could not fetch auth token for $_registry/$_repo"
        return 1
      fi
      case "$_registry" in
        docker.io) _host="registry-1.docker.io" ;;
        ghcr.io)   _host="ghcr.io" ;;
        *)         log "  WARN: unknown registry host: $_registry"; return 1 ;;
      esac
      curl -fsSI --max-time 10 \
        -H "Authorization: Bearer $_token" \
        -H "Accept: application/vnd.docker.distribution.manifest.v2+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.oci.image.manifest.v1+json,application/vnd.oci.image.index.v1+json" \
        "https://${_host}/v2/${_repo}/manifests/${_tag}" \
        | tr '[:upper:]' '[:lower:]' \
        | awk '/^docker-content-digest:/ {print $2}' \
        | tr -d '\r\n'
    }

    # Read an annotation value off the deployment. Empty output means
    # the annotation is absent (first observation) — distinct from an
    # explicit empty string, which the chart never writes.
    #
    # Uses jq because kubectl-go's jsonpath parser returns empty for
    # bracket-notation keys that contain `.` or `/` (#156).
    get_annotation() {
      _key="$1"
      kubectl get deployment -n "$RELEASE_NAMESPACE" "$DEPLOYMENT_NAME" -o json \
        | jq -r --arg k "$_key" '.metadata.annotations[$k] // empty'
    }

    # Read a container's env var value off the deployment. jq filter
    # walks containers[name=$c].env[name=$e].value; returns empty
    # string when the env var is absent OR explicitly empty (we treat
    # both the same — the script's caller decides if empty is an
    # error state).
    get_container_env() {
      _container="$1"; _env="$2"
      kubectl get deployment -n "$RELEASE_NAMESPACE" "$DEPLOYMENT_NAME" -o json \
        | jq -r --arg c "$_container" --arg e "$_env" '
            .spec.template.spec.containers[]
            | select(.name == $c)
            | (.env // [])[]
            | select(.name == $e)
            | .value // empty
          '
    }

    # =================================================================
    # Pass 1 — class-1 images: jobs-manager + pods-monitor.
    # docker.io, floating CLIENT_ENV tag, annotation-based source of
    # truth, action = kubectl rollout restart.
    # =================================================================

    restart_needed=0
    annotate_args=""

    # Each entry: "<docker-hub-repo>|<annotation-key>|<pin-flag>".
    set -- \
      "tracebloc/jobs-manager|tracebloc.io/last-refreshed-jobs-manager-digest|${JOBS_MANAGER_PINNED}" \
      "tracebloc/pods-monitor|tracebloc.io/last-refreshed-pods-monitor-digest|${PODS_MONITOR_PINNED}"

    for entry in "$@"; do
      repo="${entry%%|*}"
      rest="${entry#*|}"
      key="${rest%%|*}"
      pinned="${rest#*|}"

      log "checking ${repo}:${IMAGE_TAG} (annotation=${key})"

      if [ "$pinned" = "1" ]; then
        log "  pinned by digest in values; skipping (auto-refresh disabled for this image)"
        continue
      fi

      latest="$(get_latest_digest "$repo" "$IMAGE_TAG" "docker.io" || true)"
      if [ -z "$latest" ]; then
        log "  WARN: could not resolve latest digest (rate-limited or transient); skipping this tick"
        continue
      fi

      recorded="$(get_annotation "$key" || true)"

      log "  latest=$latest"
      log "  recorded=${recorded:-<unset>}"

      if [ -z "$recorded" ]; then
        # First-observation path: record without restarting. No evidence
        # the running pod is on an older digest; a spurious restart on
        # install would surprise operators.
        log "  first observation; recording without restart"
        annotate_args="$annotate_args ${key}=${latest}"
      elif [ "$recorded" = "$latest" ]; then
        log "  digest unchanged since last refresh; no-op"
      else
        log "  digest changed (${recorded} -> ${latest}); restart needed"
        annotate_args="$annotate_args ${key}=${latest}"
        restart_needed=1
      fi
    done

    # Order matters: rollout FIRST, annotate AFTER `rollout status`
    # succeeds. Annotating first would let a failed rollout silently
    # freeze the deployment on the old image (next tick sees
    # recorded == latest and skips).
    if [ "$restart_needed" -eq 1 ]; then
      log "rolling restart of deployment/${DEPLOYMENT_NAME}"
      kubectl rollout restart -n "$RELEASE_NAMESPACE" "deployment/${DEPLOYMENT_NAME}"
      kubectl rollout status  -n "$RELEASE_NAMESPACE" "deployment/${DEPLOYMENT_NAME}" \
        --timeout="$ROLLOUT_TIMEOUT"
      log "rollout complete"
    fi

    if [ -n "$annotate_args" ]; then
      log "updating deployment annotations:$annotate_args"
      # shellcheck disable=SC2086  # word-split annotate_args intentional
      kubectl annotate deployment -n "$RELEASE_NAMESPACE" "$DEPLOYMENT_NAME" \
        $annotate_args --overwrite
    fi

    # =================================================================
    # Pass 2 — class-2 image: ingestor.
    # ghcr.io, floating INGESTOR_TAG, env-value-based source of truth,
    # action = kubectl set env (which triggers a natural rollout via
    # ReplicaSet rotation — no explicit `rollout restart` needed).
    #
    # No annotation here because the env IS the source of truth: it's
    # the digest jobs-manager passes to each spawned ingestion Job, so
    # comparing the registry to THIS value is the most direct read of
    # "what jobs-manager would use next." Helm's 3-way merge preserves
    # the live env across future `helm upgrade --reset-then-reuse-values`
    # as long as the chart's `images.ingestor.digest` doesn't change.
    # =================================================================

    log "checking ghcr.io/tracebloc/ingestor:${INGESTOR_TAG} (env=INGESTOR_IMAGE_DIGEST on container=api)"

    if [ "$INGESTOR_PINNED" = "1" ]; then
      log "  ingestor.autoRefresh: false in values; skipping (operator opted into pinning)"
    else
      latest_ingestor="$(get_latest_digest "tracebloc/ingestor" "$INGESTOR_TAG" "ghcr.io" || true)"
      if [ -z "$latest_ingestor" ]; then
        log "  WARN: could not resolve latest digest (rate-limited or transient); skipping this tick"
      else
        current_ingestor="$(get_container_env "api" "INGESTOR_IMAGE_DIGEST" || true)"
        log "  latest=$latest_ingestor"
        log "  current=${current_ingestor:-<empty>}"

        if [ "$current_ingestor" = "$latest_ingestor" ]; then
          log "  env already current; no-op"
        else
          if [ -z "$current_ingestor" ]; then
            log "  env was empty (would 503 on ingestion submit); filling from registry"
          else
            log "  digest changed (${current_ingestor} -> ${latest_ingestor}); updating env"
          fi
          kubectl set env -n "$RELEASE_NAMESPACE" "deployment/${DEPLOYMENT_NAME}" \
            -c api "INGESTOR_IMAGE_DIGEST=${latest_ingestor}"
          kubectl rollout status -n "$RELEASE_NAMESPACE" "deployment/${DEPLOYMENT_NAME}" \
            --timeout="$ROLLOUT_TIMEOUT"
          log "  ingestor env update complete"
        fi
      fi
    fi

    log "tick complete"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "tracebloc.imageRefreshName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tracebloc.labels" . | nindent 4 }}
    app.kubernetes.io/component: image-refresh
spec:
  schedule: {{ .Values.imageRefresh.schedule | quote }}
  suspend: {{ .Values.imageRefresh.suspend }}
  # Forbid: never run two checks at once. A long rollout that crosses the
  # next scheduled tick must not stack a second `rollout restart` on top
  # of itself — that would orphan the in-flight rollout's new ReplicaSet.
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.imageRefresh.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.imageRefresh.failedJobsHistoryLimit }}
  startingDeadlineSeconds: {{ .Values.imageRefresh.startingDeadlineSeconds }}
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "tracebloc.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: image-refresh
        spec:
          serviceAccountName: {{ include "tracebloc.imageRefreshName" . }}
          restartPolicy: OnFailure
          {{- if include "tracebloc.useImagePullSecrets" . }}
          imagePullSecrets:
            - name: {{ include "tracebloc.registrySecretName" . }}
          {{- end }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: refresh
              image: "{{ .Values.imageRefresh.image.repository }}:{{ .Values.imageRefresh.image.tag }}"
              imagePullPolicy: {{ .Values.imageRefresh.image.pullPolicy }}
              # alpine/k8s entrypoint is kubectl; override to run our script.
              command: ["/bin/sh", "/scripts/image-refresh.sh"]
              env:
                # alpine/k8s's kubectl writes a discovery cache under
                # $HOME/.kube. The pod runs uid 1000 with
                # readOnlyRootFilesystem, so point HOME at the writable
                # emptyDir mounted at /home/kubectl.
                - name: HOME
                  value: "/home/kubectl"
                - name: RELEASE_NAME
                  value: {{ .Release.Name | quote }}
                - name: RELEASE_NAMESPACE
                  value: {{ .Release.Namespace | quote }}
                - name: DEPLOYMENT_NAME
                  value: {{ printf "%s-jobs-manager" .Release.Name | quote }}
                - name: IMAGE_TAG
                  value: {{ .Values.env.CLIENT_ENV | default "prod" | quote }}
                - name: ROLLOUT_TIMEOUT
                  value: {{ .Values.imageRefresh.rolloutTimeout | quote }}
                # Per-image opt-out flags. For class-1 images (jobs-manager
                # / pods-monitor), pinning is signalled by setting
                # `images.<image>.digest` to a non-empty value — same
                # signal the deployment uses to switch imagePullPolicy
                # to IfNotPresent. For the class-2 image (ingestor) the
                # signal is the explicit `images.ingestor.autoRefresh:
                # false` flag, because ingestor.digest must be non-empty
                # for jobs-manager to function (see values.yaml comment
                # block). All three guards are nil-safe.
                - name: JOBS_MANAGER_PINNED
                  value: {{ ternary "1" "0" (not (empty (default dict (default dict .Values.images).jobsManager).digest)) | quote }}
                - name: PODS_MONITOR_PINNED
                  value: {{ ternary "1" "0" (not (empty (default dict (default dict .Values.images).podsMonitor).digest)) | quote }}
                # `default true ...` would mishandle the explicit-false
                # case because Go templates treat `false` as falsy and
                # `default` overrides it. Test `eq <value> false`
                # directly — absence (nil) and explicit `true` both
                # fall through to "not pinned" (value="0").
                - name: INGESTOR_PINNED
                  value: {{ ternary "1" "0" (eq (default dict (default dict .Values.images).ingestor).autoRefresh false) | quote }}
                # Floating ghcr.io tag polled for ingestor digest changes.
                - name: INGESTOR_TAG
                  value: {{ (default dict (default dict .Values.images).ingestor).tag | default "prod" | quote }}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                {{- toYaml .Values.imageRefresh.resources | nindent 16 }}
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
                # alpine/k8s's kubectl writes a cache under $HOME (default
                # /root). The pod runs as uid 1000 with readOnlyRootFilesystem,
                # so HOME=/home/kubectl needs to be writable; emptyDir mount.
                - name: home
                  mountPath: /home/kubectl
          volumes:
            - name: scripts
              configMap:
                name: {{ include "tracebloc.imageRefreshName" . }}
                defaultMode: 0555
            - name: tmp
              emptyDir: {}
            - name: home
              emptyDir: {}
{{- end }}
