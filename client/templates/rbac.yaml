---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tracebloc.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tracebloc.labels" . | nindent 4 }}
{{- if ne .Values.clusterScope false }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tracebloc.rbacName" . }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tracebloc.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  # client-runtime#21: jobs-manager's POST /internal/submit-ingestion-run
  # endpoint authenticates callers (the ingestor subchart's post-install
  # hook) via TokenReview, then creates a per-run ConfigMap (ingest.yaml)
  # and Secret (BACKEND_TOKEN) before spawning the ingestor Job.
  #
  # TokenReview is a cluster-scoped Kubernetes API; the create verb cannot
  # be granted by a namespace Role. This means the ingestion endpoint
  # requires ``clusterScope: true``. The else branch below intentionally
  # omits it.
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    # `get` is required by jobs-manager's orphan-resource verify path
    # (client-runtime#52) and the missing-row self-heal (client-runtime#54):
    # on a create-409 it reads the existing ConfigMap/Secret to confirm the
    # content matches before reusing it. Without `get`, those reads return
    # Forbidden and the endpoint 500s instead of the intended 409/replay.
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tracebloc.rbacName" . }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tracebloc.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "tracebloc.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "tracebloc.rbacName" . }}
  apiGroup: rbac.authorization.k8s.io
{{- else }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "tracebloc.rbacName" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tracebloc.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  # client-runtime#21: ingestion endpoint creates a per-run ConfigMap
  # (ingest.yaml) and Secret (BACKEND_TOKEN) before spawning the Job.
  # TokenReview is omitted here (cluster-scoped API; not grantable by a
  # namespace Role). Customers using clusterScope: false won't be able
  # to authenticate ingestion calls — see the ClusterRole branch above.
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    # `get` is required by jobs-manager's orphan-resource verify path
    # (client-runtime#52) and the missing-row self-heal (client-runtime#54):
    # on a create-409 it reads the existing ConfigMap/Secret to confirm the
    # content matches before reusing it. Without `get`, those reads return
    # Forbidden and the endpoint 500s instead of the intended 409/replay.
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "tracebloc.rbacName" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tracebloc.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "tracebloc.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "tracebloc.rbacName" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
