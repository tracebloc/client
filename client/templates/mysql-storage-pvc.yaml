{{- $name := include "tracebloc.mysqlPvc" . -}}
{{- $storage := include "tracebloc.mysqlStorage" . -}}
{{- if .Values.hostPath.enabled }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "tracebloc.mysqlPvName" . }}
  labels:
    {{- include "tracebloc.labels" . | nindent 4 }}
spec:
  storageClassName: {{ include "tracebloc.storageClassName" . }}
  capacity:
    storage: {{ $storage }}
  accessModes:
    - ReadWriteOnce
  claimRef:
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
  hostPath:
    path: /tracebloc/{{ .Release.Name }}/mysql
    type: DirectoryOrCreate
---
{{- end }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
  labels:
    {{- include "tracebloc.labels" . | nindent 4 }}
spec:
  storageClassName: {{ include "tracebloc.storageClassName" . }}
  accessModes:
    - {{ .Values.pvcAccessMode | default "ReadWriteMany" }}
  resources:
    requests:
      storage: {{ $storage }}
