{{- if and .Values.hostPath.enabled .Values.hostPath.initJob }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-create-directories
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
  labels:
    {{- include "tracebloc.labels" . | nindent 4 }}
spec:
  template:
    spec:
      containers:
      - name: create-dirs
        image: busybox:1.35
        command: ["/bin/sh", "-c"]
        args:
        - |
          mkdir -p /mnt/host{{ include "tracebloc.hostPath.data" . }}
          mkdir -p /mnt/host{{ include "tracebloc.hostPath.logs" . }}
          mkdir -p /mnt/host{{ include "tracebloc.hostPath.mysql" . }}
          chmod -R 777 /mnt/host{{ include "tracebloc.hostPath.data" . }}
          chmod -R 777 /mnt/host{{ include "tracebloc.hostPath.logs" . }}
          chmod -R 777 /mnt/host{{ include "tracebloc.hostPath.mysql" . }}
        volumeMounts:
        - name: host-root
          mountPath: /mnt/host
      volumes:
      - name: host-root
        hostPath:
          path: /
          type: Directory
      restartPolicy: OnFailure
{{- end }}
