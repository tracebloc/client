suite: Secrets
templates:
  - templates/secrets.yaml
  - templates/docker-registry-secret.yaml
tests:
  - it: should create tracebloc secret with encoded password
    template: templates/secrets.yaml
    set:
      clientId: "my-client-id"
      clientPassword: "my-secret-pass"
    asserts:
      - isKind:
          of: Secret
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-secrets
        documentIndex: 0
      - equal:
          path: type
          value: Opaque
        documentIndex: 0
      - isNotEmpty:
          path: data.CLIENT_ID
        documentIndex: 0
      - isNotEmpty:
          path: data.CLIENT_PASSWORD
        documentIndex: 0
      - matchRegex:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          pattern: Helm
        documentIndex: 0

  - it: should use explicit requests-proxy admin token override
    template: templates/secrets.yaml
    set:
      clientId: "my-client-id"
      clientPassword: "my-secret-pass"
      requestsProxyAdminToken: "override-token"
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-requests-proxy-admin
        documentIndex: 1
      - equal:
          path: data.token
          value: b3ZlcnJpZGUtdG9rZW4=
        documentIndex: 1

  - it: should generate requests-proxy admin token when no override is provided
    template: templates/secrets.yaml
    set:
      clientId: "my-client-id"
      clientPassword: "my-secret-pass"
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-requests-proxy-admin
        documentIndex: 1
      - isNotEmpty:
          path: data.token
        documentIndex: 1

  - it: should create docker registry secret when create is true
    template: templates/docker-registry-secret.yaml
    set:
      clientId: "my-client-id"
      clientPassword: "my-secret-pass"
      dockerRegistry:
        create: true
        server: https://index.docker.io/v1/
        username: testuser
        password: testpass
        email: test@test.com
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-regcred
      - equal:
          path: type
          value: kubernetes.io/dockerconfigjson
      - isNotEmpty:
          path: data[".dockerconfigjson"]

  - it: should not create docker registry secret when create is omitted (default false)
    template: templates/docker-registry-secret.yaml
    set:
      clientId: "my-client-id"
      clientPassword: "my-secret-pass"
      dockerRegistry:
        server: https://index.docker.io/v1/
        username: testuser
        password: testpass
        email: test@test.com
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create docker registry secret when dockerRegistry is omitted (public images)
    template: templates/docker-registry-secret.yaml
    set:
      clientId: "my-client-id"
      clientPassword: "my-secret-pass"
    values:
      - values-public-images.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should reject placeholder clientId value
    template: templates/secrets.yaml
    set:
      clientId: "<CLIENT_ID>"
      clientPassword: "real-pass"
    asserts:
      - failedTemplate: {}

  - it: should reject empty credentials
    template: templates/secrets.yaml
    set:
      clientId: ""
      clientPassword: ""
    asserts:
      - failedTemplate: {}

