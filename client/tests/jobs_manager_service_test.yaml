suite: jobs-manager Service
templates:
  - templates/jobs-manager-service.yaml
set:
  clientId: "test-id"
  clientPassword: "test"
tests:
  - it: should render a single Service document
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service

  - it: should name the Service jobs-manager (stable in-cluster name contract)
    asserts:
      - equal:
          path: metadata.name
          value: jobs-manager

  - it: should be ClusterIP only (no external exposure)
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should not be a NodePort or LoadBalancer
    asserts:
      - notEqual:
          path: spec.type
          value: NodePort
      - notEqual:
          path: spec.type
          value: LoadBalancer

  - it: should select the jobs-manager pods via app=manager
    asserts:
      - equal:
          path: spec.selector.app
          value: manager

  - it: should expose the ingestion HTTP port 8080 over TCP
    asserts:
      - equal:
          path: spec.ports[0].name
          value: http
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.ports[0].targetPort
          value: 8080
      - equal:
          path: spec.ports[0].protocol
          value: TCP
      - lengthEqual:
          path: spec.ports
          count: 1

  - it: should carry the app=manager label and standard chart labels
    asserts:
      - equal:
          path: metadata.labels.app
          value: manager
      - isNotNullOrEmpty:
          path: metadata.labels["app.kubernetes.io/managed-by"]
      - isNotNullOrEmpty:
          path: metadata.labels["helm.sh/chart"]

  - it: should live in the release namespace
    release:
      namespace: my-custom-ns
    asserts:
      - equal:
          path: metadata.namespace
          value: my-custom-ns
