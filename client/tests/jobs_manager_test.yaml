suite: Jobs Manager Deployment
templates:
  - templates/jobs-manager-deployment.yaml
set:
  clientId: "test-id"
  clientPassword: "test"
  dockerRegistry:
    server: https://index.docker.io/v1/
    username: test
    password: test
    email: test@test.com
tests:
  - it: should create a Deployment
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-jobs-manager

  - it: should have standard labels
    asserts:
      - exists:
          path: metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]
      - exists:
          path: metadata.labels["helm.sh/chart"]

  - it: should use dedicated service account
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-jobs-manager

  - it: should have security context
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault

  - it: should drop all capabilities on api container
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: "ALL"

  - it: should have resource limits on api container
    asserts:
      - isNotEmpty:
          path: spec.template.spec.containers[0].resources.requests
      - isNotEmpty:
          path: spec.template.spec.containers[0].resources.limits
      # v1.1.0 floor: 512Mi/1Gi for api, after the prod OOM investigation.
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 512Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 1Gi
      - equal:
          path: spec.template.spec.containers[1].resources.requests.memory
          value: 256Mi
      - equal:
          path: spec.template.spec.containers[1].resources.limits.memory
          value: 512Mi

  - it: should reference secret via helper
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.name
          value: RELEASE-NAME-secrets

  - it: should use docker.io registry by default
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^docker\\.io/tracebloc/"

  - it: should set JOB_IMAGE_HOST to docker.io
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: JOB_IMAGE_HOST
            value: "docker.io/"

  - it: spawns the ingestor by floating tag by default (revert-proof across helm upgrade)
    # Default (no pinned digest): jobs-manager spawns each ingestion Job by
    # the floating tag with imagePullPolicy=Always, so the cluster always
    # runs the current published ingestor and a `helm upgrade` that resets
    # values cannot revert it. Wires REPOSITORY + TAG + an empty DIGEST into
    # client-runtime submit_ingestion_run._build_image_reference.
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INGESTOR_IMAGE_REPOSITORY
            value: "ghcr.io/tracebloc/ingestor"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INGESTOR_IMAGE_TAG
            value: "0.3"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INGESTOR_IMAGE_DIGEST
            value: ""

  - it: pins the ingestor digest when images.ingestor.digest is set (opt-in reproducibility)
    set:
      images:
        ingestor:
          digest: "sha256:dfdaa7e633a8df0f46b403e9422eba5c16bdb7d9c39047e6d3738f9e38fbdba8"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INGESTOR_IMAGE_DIGEST
            value: "sha256:dfdaa7e633a8df0f46b403e9422eba5c16bdb7d9c39047e6d3738f9e38fbdba8"

  - it: ingestor repository + tag are overridable for a private mirror / air-gapped registry
    set:
      images:
        ingestor:
          repository: "private.registry/ingestor"
          tag: "0.4"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INGESTOR_IMAGE_REPOSITORY
            value: "private.registry/ingestor"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INGESTOR_IMAGE_TAG
            value: "0.4"

  # client-runtime#92: SINGLE_NODE gates jobs-manager's GPU->CPU pending
  # fallback; it defaults to hostPath.enabled so managed (dynamic-PVC)
  # clusters never auto-downgrade while installer/bare-metal single-host
  # clusters keep the hard rule.
  - it: should default SINGLE_NODE to "false" on managed (hostPath disabled) clusters
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SINGLE_NODE
            value: "false"

  - it: should set SINGLE_NODE to "true" when hostPath is enabled
    set:
      hostPath:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SINGLE_NODE
            value: "true"

  - it: should let an explicit env.SINGLE_NODE override the hostPath-derived default
    set:
      hostPath:
        enabled: true
      env:
        SINGLE_NODE: "false"
    asserts:
      # explicit "false" wins over hostPath.enabled=true, and is emitted
      # exactly once (not duplicated by the generic env range).
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SINGLE_NODE
            value: "false"
          count: 1

  # tracebloc/backend#745: the per-spawned-training-job resource request/limit
  # the jobs-manager hands to each Job it creates. The chart is the single
  # effective source of truth — it ALWAYS injects RESOURCE_REQUESTS /
  # RESOURCE_LIMITS, so client-runtime's jobs_manager.py only falls back to its
  # own default when they are absent. Pin the rendered value here so the two
  # cannot silently diverge again, on BOTH containers that receive it
  # (api + pods-monitor).
  - it: defaults spawned-job RESOURCE_REQUESTS/LIMITS to cpu=2,memory=8Gi (req==limit => Guaranteed QoS)
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RESOURCE_REQUESTS
            value: "cpu=2,memory=8Gi"
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RESOURCE_LIMITS
            value: "cpu=2,memory=8Gi"
          count: 1
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: RESOURCE_REQUESTS
            value: "cpu=2,memory=8Gi"
          count: 1
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: RESOURCE_LIMITS
            value: "cpu=2,memory=8Gi"
          count: 1

  - it: lets operators override spawned-job resources via env.RESOURCE_REQUESTS/LIMITS
    set:
      env:
        RESOURCE_REQUESTS: "cpu=4,memory=16Gi"
        RESOURCE_LIMITS: "cpu=4,memory=16Gi"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RESOURCE_REQUESTS
            value: "cpu=4,memory=16Gi"
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RESOURCE_LIMITS
            value: "cpu=4,memory=16Gi"
          count: 1

