# ============================================================
# Tracebloc Unified Helm Chart — values.yaml
# ============================================================
# This chart supports AKS, EKS, bare-metal (bm), and OpenShift (oc).
# Platform-specific behaviour is controlled by the values below.
# Use per-environment value files (e.g. ci/aks-values.yaml) to override.

# -- Environment variables passed to containers
env: {
  # CLIENT_ENV: prod
  # Optional proxy settings
  # HTTP_PROXY_HOST: ""
  # HTTP_PROXY_PORT: ""
  # HTTP_PROXY_USERNAME: ""
  # HTTP_PROXY_PASSWORD: ""
  # Optional: resource requests for spawned jobs (defaults to "cpu=2,memory=8Gi" if not provided)
  # RESOURCE_REQUESTS: "cpu=2,memory=8Gi"
  # Optional: resource limits for spawned jobs (defaults to "cpu=2,memory=8Gi" if not provided)
  # RESOURCE_LIMITS: "cpu=2,memory=8Gi"
  # Optional: GPU requests for spawned jobs (defaults to "nvidia.com/gpu=1" if not provided)
  # GPU_REQUESTS: "nvidia.com/gpu=1"
  # Optional: GPU limits for spawned jobs (defaults to "nvidia.com/gpu=1" if not provided)
  # GPU_LIMITS: "nvidia.com/gpu=1"
  # Optional: runtime class for GPU jobs (defaults to "" if not provided)
  # RUNTIME_CLASS_NAME: ""
}
# -- StorageClass configuration
# When create: true, the StorageClass name is release-unique (e.g. "<release-name>-storage-class")
# so each release gets its own class and Helm ownership conflicts are avoided.
# Set create: false to use an existing storage class; then name must match that class.
storageClass:
  create: true
  name: client-storage-class  # only used when create: false
  provisioner: ""
  allowVolumeExpansion: true
  # Optional fields — omitted from rendered YAML when empty
  volumeBindingMode: ""
  reclaimPolicy: ""
  mountOptions: []
  parameters: {}

# -- Bare-metal only: hostPath-backed PersistentVolumes
# When enabled, a PV + PVC pair is created for each volume.
# When disabled, only dynamic PVCs are created (AKS/EKS/OC pattern).
hostPath:
  enabled: false
  # PV paths are fixed: /tracebloc/data, /tracebloc/logs, /tracebloc/mysql (→ ~/.tracebloc/{data,logs,mysql} when HOST_DATA_DIR is mounted at /tracebloc). Directories are created automatically via hostPath type: DirectoryOrCreate.

# -- PVC storage sizes (override per-environment if needed)
pvc:
  mysql: 2Gi
  logs: 10Gi
  data: 50Gi

# -- PVC access mode (ReadWriteMany for dynamic, ReadWriteOnce for hostPath)
# Override per-environment if needed
# pvcAccessMode: ReadWriteMany


# -- RBAC scope: true for ClusterRole, false for namespace-scoped Role (recommended for OpenShift without cluster-admin)
clusterScope: true

# -- Resource monitor DaemonSet (node-level metrics collection)
resourceMonitor: true

# -- OpenShift-specific settings
openshift:
  # Create a SecurityContextConstraints allowing hostPath for the resource monitor
  scc:
    enabled: false

# -- Namespace management
# Default: OFF -- the chart assumes the operator pre-created the namespace via
#   kubectl create namespace <name>
# or
#   helm install --create-namespace -n <name> ...
#
# Set namespace.create: true ONLY on greenfield installs. The chart then
# templates the Namespace with Pod Security Admission labels applied and
# `helm.sh/resource-policy: keep` so uninstall does not delete your data.
#
# For EXISTING namespaces, leave create: false and apply the labels yourself:
#   kubectl label namespace <name> \
#     pod-security.kubernetes.io/warn=restricted \
#     pod-security.kubernetes.io/audit=restricted
#
# Enforce mode is deliberately left OFF by default -- the mysql init
# container and the resource-monitor DaemonSet violate the restricted
# profile (runAsUser: 0 and hostPath respectively). Opting into enforce
# before those are refactored will break the chart.
namespace:
  create: false
  podSecurity:
    # Kubectl warnings for pods that violate the profile
    warn: restricted
    warnVersion: "latest"
    # Audit-log events for pods that violate the profile
    audit: restricted
    auditVersion: "latest"
    # Pod rejection (leave empty by default; see note above)
    enforce: ""
    enforceVersion: ""

# -- Secrets
clientId: "<CLIENT_ID>"
clientPassword: "<CLIENT_PASSWORD>"

# -- Docker registry credentials (optional; only used when dockerRegistry is set and create is true)
# Omit dockerRegistry entirely, or set create: false, for public images (no imagePullSecrets).
# When create is true, secret name is {{ .Release.Name }}-regcred.
# dockerRegistry:
#   create: true
#   server: https://index.docker.io/v1/
#   username: "<DOCKER_USERNAME>"
#   password: "<DOCKER_REGISTRY_TOKEN>"
#   email: "<DOCKER_EMAIL>"
